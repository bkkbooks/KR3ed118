body:
  text: 卷三肩腋擔肩癰癤此惟擔夫有之五倍子燒存性為細末加黃丹用水飛過醋調敷之甚效腋下狐臭鳳仙花不拘紅白搗成大丸挾腋下待乾再換每日易三四次二三日內腋下結有黑墜以壙灰調水點去永遠斷根又伏龍肝作泥敷之良又煮雞子兩枚熟去殼乘熱各挾腋下冷棄之三岔路口勿反顧三為之又好礬石煅研末絹囊盛之常以粉腋下不過十度又三年苦酒和石灰敷之又蒸餅一個劈作兩片放密陀僧細末一二錢急挾入腋下略睡片時候冷棄去如系一腋狐臭只用一片夾之神效又密陀僧潮腦各四兩枯白礬二兩輕粉三錢共為細末頻擦兩腋擦至半月見效不可間斷半年愈又薑汁頻塗絶根又麝香一分膽礬二分水粉三分取田螺二個將靨起開以各藥入螺中過一夜螺肉即化為水將水擦腋下其臭從大便出宜埋土內恐人聞則頭眩暈也此方極效勿輕視腋下瘤癭長柄葫蘆燒存性研末塗之以消為度手灌甲初起用瓷鋒於甲上刨去一層並用枯礬末敷之神效油灰指甲每日取鳳仙花連根蒂葉搗敷指甲上用布包好一日一換月餘愈指頭畏冷天氣不寒指尖作冷名曰螺瘡用醋和鹽調勻將指頭泡入自愈手丫枝痛痛苦無奈者以通草屑為末用雞子清調塗即愈並治各手指縫生瘡腫爛手指掣痛用醬清即醬上汁水和蜜溫熱浸之效指頭麻木痛癢取蜒蝣和銀硃共搗擦之若遲延不治必生蛇頭蛀節等疔蛇疔治法載疔瘡門初起多擦幾遍即消指節生瘡名蛀節用生黃豆嚼融敷須先嗽口再嚼即愈甲疽凡指甲邊生一赤肉突出時常舉發者甲疽也用狼毒一錢黃耆二兩醋浸一宿入豬油五兩微火上煎取二兩絞去渣退火氣敷之日換三次神效又乳香膽礬研細末時時敷之此症須剔去甲不藥亦愈若已成瘡久不愈者此方甚效又皂礬五錢火煅候冷研末先以鹽湯洗瘡拭乾以礬末敷之舊綢裹定一日一換神效脫骨疽此症生手足各指或云生手足第四指者是或指頭或指節指縫初生或白色痛極或如粟米起一黃泡其皮或如煮熟紅棗黑色不退久則潰爛節節脫落延至手足背腐爛黑陷痛不可忍頂大甘草研極細末香麻油調敷要敷極厚一日一換不可間斷忌食發物並忌抓擦不出十日即愈真神方也或用甘草嚼融厚敷干隨換日夜不斷數日必愈虎口並各手指縫生瘡或腫或爛痛不可忍若不早治即爛入手鮮蒲公英捶融敷之數日即愈又白芷滑石黃丹各等分研極細末敷之並治手指縫觸著紙角衣角痛癢破爛又白芨三錢研末蟾酥一錢共和雞子清搽之手掌連虎口邊腫毒豬肉臺上刮下木屑如膏作餅貼患處即愈手指及掌生黃白膿泡痛癢無時纏綿不已內必有蟲豬肝切片和桃葉捶融敷之神效拍蟹毒即手大指食指間所生俗名丫指用活蟹杵爛塗之沸瀋傷臂皮盡蛻貓頭骨煅灰敷之效掌中紅絲斷之血流不止用燈火燒之自能漸收平愈熱毒攻手腫痛欲脫豬油和羊糞塗之又水煮馬糞洗之代指山慈菰研末醋調敷之又豬膽和蚯蚓搗爛塗之又田螺生搗碎敷之又蜒蝣蟲碾末和醬搽一日愈又取萎黃蔥葉煮汁熱漬之又蒲公英蒼耳草等分為末好醋煎濃浸洗又烏梅搗爛和醋浸之又甘草煎湯漬之手背皴裂大風子搗泥塗之手足皴裂大蘿蔔一個雕空入柏油五錢安爐火上燉熟候冷取油擦患處又白芨末水調塗之手足皺裂生白果嚼爛夜夜塗之又豬腦髓入熱酒中以洗之自瘥手足凍瘡山藥一截磨泥塗之又老絲瓜燒存性和臘月豬脂塗又松香一兩黃蠟五錢將火化和帶熱塗患處作筒籠指頭並治代指又鴿子糞煎濃水洗數次效又冬瓜皮五六兩茄根數兩煎水洗之自愈手足腫搗苦菜敷之良手足心腫風也用花椒研末和鹽醋封之自愈手足麻木桑枝並葉煎湯浸洗手足心中忽然腫起或痛或不痛或爛或不爛名穿掌又名擎疽又名托盤生附子切片貼之或用生附子煎水泡之更妙數日後不痛者必然作痛作癢切不可用手搔仍用附子泡之或附子切片加輕粉一分貼必愈又溏雞糞敷之鮮桑葉搗敷數次可愈永戒鵝肉又未破者用白鹽花椒末等分醋和敷之已破者勿用手足生瘡久不收口取大路口多人撒尿木版爛成白色者以炭火煅化研細末加冰片少許摻之效手足被扤夜合樹皮取咀煎浴手足軟疼吳茱萸三兩煎湯熱洗三四次避風即愈手足火爛瘡梓葉煎湯洗仍以葉為末敷之兩臂彎兩腿生瘡痛癢經久不愈多年風窗上蜊殼燒灰以醃豬油同搗如泥塗之經宿即愈乳乳頭破裂胭脂和蛤粉用水調敷又秋月冷茄子裂開者陰乾燒存性研末水調塗又丁香末敷如燥津唾調敷乳頭硬腫生山藥不拘多少搗爛敷之又蓮蓬杆一把或用荷葉杆煎湯熏洗又蚯蚓糞以陳醋調塗乳癤初起巴豆一粒細辛一錢五分上焙研用稀絹包縛扎塞鼻孔周時即消又生半夏一粒塞鼻生右乳塞左鼻生左塞右一宿即消乳核初起可散久則成岩用蔥和蜜同遠志末敷忌入口又蚶子殼煅研末醋調塗又烏頭桂心甘草各等分研末酒調敷乳中有塊積久不消活鯽魚一個搗爛去鱗骨和老酒糟厚敷患處一宿消女子妒乳生蔓菁根搗和鹽醋漿水煮汁洗五六度和雞子白封之又柳白皮酒煮令熱以尉上即消乳癰紅腫疼痛者是男女皆有此症白梅杵爛貼佳又地黃搗敷之熱即易又豆腐店棹上做豆腐淋下之水一桶入鍋熬幹成膏冷透火氣厚敷之干即再敷乳上結塊自消五七次必愈屢驗又佛手山藥搗敷患處圍露出頭次日即出膿消去最驗又蔥連根搗爛敷上用瓦罐盛炭火蓋蔥上一時蒸熱出汗即愈穩而神效並治乳吹又白麵半斤炒黃醋煮糊塗即消又水柳根生擂貼之其熱如火二貼即愈又大黃灶下黃土各一分末生薑二分搗末醋和塗神效乳癰多至二三百頭者柳樹根刮去皮搗爛蒸熱布包尉之冷則隨換過一宿即愈乳癰久不收口茅屋上陳年茅草剪尾一束研末加頂上梅花冰片少許敷之良又日久腫痛不愈者用蝦醬入好醋蒸熱敷之奇效乳癰寒熱蔓菁根葉去土不見水以鹽和搗塗之熱即換三五次即瘥冬月用根須避風勒乳成癰益母草為末水調塗乳上生搗罨之亦可乳癰竄爛年久洞見內腑深陷不愈者取搖船櫓上首手捏處舊藤箍剪下以陰陽瓦上熯乾研末用竹管扎棚篩日日摻之干處以香油調搽半月必愈乳頭生瘡痛不可忍生鹿角三分生甘草一分共研末用雞蛋黃一個入藥攪勻置銅器中炙溫敷之日二次即愈神驗非常男女乳上濕瘡膿血淋漓成片痛癢不休用蜂殼煅五錢輕粉五分冰片一分共研末用銀花煎湯調塗二三次結痂收功乳瘡腫痛糯米飯塗之又生蘿蔔連根帶泥搗爛敷熱即易二三次效又胡麻炒焦研末以燈窩內油腳調塗即散婦人乳吹時時吹氣有聲硃砂寫地支十二字於本婦所戴簪上惟本命所屬之字不寫戴之自愈初起時用之最妙婦人乳忽縮入急用兩手緊緊抓住取公雞一隻約重十兩內外連毛破開去腸雜加真麝香一錢入雞肚內覆肚臍上即愈無子食乳腫痛難消用本夫穿過包腳布敷乳過夜腫消痛止或用本婦現穿之鞋包乳上過夜亦消胸結胸用初出殼黃毛雞子一隻生薑四兩共搗爛微炒溫攤胸前結實之處外用絹帛縛定候半日覺腹中熱燥方解去更以熱手揉之龜胸龜尿時時擦之久久自平置龜銅盆中以鏡對照龜見其形尿自出胸旁生瘡凡大人小兒胸間兩旁各生紅白瘰泡濕爛疼癢每處直長一條連生十餘個不等名簾珠倒掛久則難治諸藥不效用端午日人家檐口所掛菖蒲連根葉切碎瓦上焙枯研末香油調塗五六次效胸背疼痛而悶因風寒濕起者用尉背法肉桂心附子羌活烏頭細辛川椒各一錢五分川芎一錢共為細末以帛包之微火炙令熱以尉背上取瘥止心心口生疽此名井泉疽又名慢心鋭毒初起若心口內有塊漸大心口發高毒陷即死醫皆束手亦無藥治之惟林屋山人祕方載一法以本人兩手十指以線量其長短共有若干積於一線放喉管正中處雙環至背脊之中看兩線合攏盡頭處為中穴又以本人中指之中一節用竹片量准作一寸放在中穴之左右各遠一寸各以墨記分立三穴如形每穴用艾三團一齊火灸灸畢全愈心窩成漏一人胸口一片碗大無皮潰爛成漏膿血時流經久不愈用荸薺磨粉摻之數日即瘥心痛危急症奇效方王瓜一條剖對開去肉去子填入明礬末合住線縛懸掛陰乾待瓜皮上起白霜刮下研細藏瓷器封固凡遇急症心痛欲死者但口有微氣將瓜霜點眼四角立愈心腹冷痛以布裹胡椒安痛處用尉斗尉椒令汗出即止並治尸蛀心腹卒然脹痛急煮熱湯須百沸者以漬手足冷即易之脅治脅痛白芥子為末水調敷痛處又吳茱萸醋調敷又青皮醋炒尉又韭菜連根醋炒尉又枳殼小茴香鹽炒尉兩脅脹痛炒鹽布裹尉之背禦寒膏治背惡寒及婦人産後風寒手足厥冷至骨又治腰痛生薑半斤取自然汁入黃明膠三兩乳香沒藥各一錢五分銅杓內煎化移在滾湯上燉以柳條攪至成膏又入川椒末三錢再攪勻用皮紙攤貼患處時以鞋底烘尉之候五七日脫下或起小泡乃寒濕之氣外出也背熱如火此虛火也生附子研末口水調敷兩足心發背初起雞內金不落水者陰乾用時溫水潤開貼之隨干隨潤以愈為度如已潰雞內金同綿絮焙末搽又生薑一塊炭火炙一層刮一層為末以豬膽汁調塗又腫焮赤熱者用浮萍搗和雞子清貼之治發背取豬羊脂封之亦治髮乳又人糞燒灰醋和敷干即易又取白麵搜圍腫四畔令童子七人尿漬之又以馬糞封之干即易亦治婦人髮乳又鮮王瓜切片貼周時換若破爛先用花椒湯洗淨貼又苧根葉熟搗敷之數易效又芭蕉根搗爛塗之並治一切腫毒赤遊風疹又冬瓜截去頭合瘡上瓜爛截去再合以愈為度已潰者合之亦能漸斂又滴乳香四兩箬包燒紅磚壓去油淨沒藥四兩照上法去油鮮油血竭白色兒茶上好銀硃杭州定粉上好黃丹各四兩上銅緑三錢以上俱各另碾無聲篩極細末共一處臨時照患大小用夾連四油紙一塊以針多刺小孔每張稱藥末五錢用真正麻油調攤紙上再用油紙一塊蓋上周圍用線將二紙合縫一處貼患上用軟絹扎緊自然止痛化腐生新過三日將膏揭開濃煎蔥湯將患上洗淨軟絹拭乾將膏藥翻過用針照前多刺小孔貼之因藥甚貴取其又得一面之藥力也無火之人內服十全大補湯有火之人減去肉桂薑棗煎服兼以飲食滋補無不取效至重者用膏二張百無一失此方甚奇以千金得之用無不效又治背疽即潰如碗麵見五臟者亦治用大鯽魚一枚去腸雜以羯羊糞實其中烘焙焦黑極乾燥研為細末干糝之神效又治背癰用芝麻油一斤黃丹飛八兩宮粉一兩槐枝數寸頭髮一團洗透鏽釘五七個洗淨土銅緑五錢將油燒滾入釘熬數滾去釘入槐枝熬枯去之入發熬焦又去之入丹粉銅緑熬成膏置水中隔夜取出貼之其效如神百無一失腰腰痛蕓薹子用米醋研塗敷痛處又以黃狗皮裹腰痛處取暖徹即定又貼腰膏用生薑一斤取自然汁四兩水膠一兩同煎成膏厚紙攤貼腰眼甚效又菊花芫花羊躑躅各二升以醋拌令濕潤分為兩劑內二布囊中蒸之如炊一斗米許頃適寒溫隔衣尉之冷即易尉痛處即瘥又黑大豆一大碗一方作大豆六升水拌令濕炒熱以布裹隔一重衣尉痛處令暖氣徹冷即易之風冷寒痹腰痛川烏三個生搗爛少加鹽水攤紙帛上貼痛處須臾止塈腰有血痛不可忍桂心搗末以苦酒和塗痛處腰脊脹痛芥子末調酒貼之立效腰腎痛白檀磨水塗患處腰腿風濕冷痛吳茱萸一茶杯研末以黃酒一杯拌勻炒熱攤油紙上敷患處用布捆好立時止痛如冷再炒再敷養元固本暖腰方廣木香真川椒大茴香炒故紙升麻各一兩川附子五錢蘄艾半斤丁香四錢上肉桂川楝子各一兩先將艾搓軟次以各藥為末和勻用綾絹做暖腰入藥密行貼肉著神妙閃跌毆打腰痛三仙散羅裙帶葉葉長二尺余花梗長二三尺不等花如龍爪四圍下垂又名龍爪花與金針花相似而略大顏色或紅或白杉樹皮槐樹皮各等分煎水熱洗其渣搗融炒熱布包敷之冷則隨換日夜不斷有人閃跌傷腰筋已結縮成團多年不愈以此敷洗筋即舒散數次平復又名生軍散先以蔥白搗爛炒熱將痛處擦遍隨以生大黃研末薑汁調敷蓋以粗紙一日一換儘量飲以好酒三日即愈年餘不痊者皆效並治閃跌內傷肩挑重物受傷初時不覺日久忽然疼痛浮面按之不痛或咳嗽牽扯作痛三五年不愈者用此亦效又真硼砂研極細末用燈心點眼四角淚出即松連點三次全愈纏蛇丹毒糯米粉和鹽塗之又刺鱔魚尾血同蜒蝣搗塗又用織機上草辮以陳為妙燒存性麻油調搽又舊傘紙燒存性香油調敷又繫腰帶煅存性研細和好醬塗或加水龍骨和柿漆水塗肚腹腹痛驟然急痛不知何症只用鹽微炒熱以布包鹽熱尉痛處即止並治肝胃氣及胃脘腹中脹痛又羌活一兩蔥白十根老薑二兩麥面和炒熱用布包裹尉腹冷再炒尉又以痧藥搐鼻寒火相結小腹疼痛俗名陰寒枯白礬一大塊棗肉一大個連須蔥白三段胡椒按病人歲數一歲一粒共研末用男孩所吃之乳合一處共搗為丸安放肚臍上一炷香時痛止忌食生冷寒症腹痛或炒蔥姜尉之或炒鹽尉之或用熱灰尉之或用滾水一壺隔布尉之均止痛妙法也熱症腹痛用銅鐵冷物尉之蟲疾腹痛如有塊硬起者用手在硬處久久揉擦至一日其蟲即死從大便出或查痞疾各方治之又川楝肉酒浸綿裹塞肛門小兒用煨大蒜塞尸柱腹痛脹急不得喘息上攻心胸旁攻兩脅痛或瘰塊湧起煮商陸根囊盛更互尉之取效又取屋四角茅納銅器中以三尺布覆腹著器布上燒茅令熱隨痛追逐跖下癢便瘥若瓦屋削四角柱燒用之因色欲致手足冷臍腹痛用胡椒十五粒丁香十粒黃丹一錢生白礬三錢共研末醋調塗臍中被蓋出汗愈又炒蔥熱貼臍中冷則易之忽然肚黑鉛粉和鹽炒焦敷之立效肚腹脹大亮如水晶取癩蝦蟆六隻將四足扎住以蝦蟆肚皮在病人肚腹光亮之處輕輕摩擦幾次再取一蟆照前復摩用至六隻即愈但蝦蟆眉內有蟾酥須防其迸出射人傷眼宜用綢帕遮住病人兩眼蝦蟆用過後即放水中使吐毒氣以救其命至要氣滯腹脹手背腳膝疼痛大麥醋糟炒熱布裹尉之三兩換愈臍中出水龍骨醋泡焙枯研末敷又龍骨枯礬等分為末摻之即止又赤石脂研細末敷遺濁夢遺紫花地丁草搗為膏貼臍立止又用闊布帶將膝彎一隻或左或右扣絆項上令腳屈睡醒解伸左右更換屈伸而睡自止又五倍子一兩二錢醋調為丸如大黑豆樣點燈後用一丸填臍內以小膏藥蓋上不拘何項膏藥均可日間取下亦可每夜換一丸近十日盡料全愈遺精文蛤研細末以女兒津調貼臍內立止又陰莖泄用紅杷子即南天竹子燒存性一錢加冰片五釐麻油和塗赤白濁椿根白皮三兩乾薑白芍黃柏各一兩麻油熬黃丹收攤貼又在浴堂中不使人知出一小便可愈淋濁治男子精寒痿弱白濁遺精女子子宮虛冷赤白帶下亦治寒瀉倭硫黃六錢母丁香五錢麝香一錢獨蒜丸如豆大硃砂為衣每用一丸納臍眼上貼紅緞膏紅緞膏方川椒三兩韭菜子蛇床子附子肉桂各一兩獨蒜一斤真香油二斤浸藥熬黃丹收攤貼淋症治石淋沙淋妙方白豆蔻連殼砂仁去殼白胡椒真川椒不真不效各等分共研末每用一二錢入小布袋內以好汾酒頂上燒酒亦可燉滾乘熱衝入布袋套上陽頭蓋衣熏之藥冷再衝滾酒再熏一日數次三日必愈熏後陽物及腎囊稍覺辣疼熱水洗淨自安一切淋症屬虛者並小便不通皆治氣淋臍中著鹽灸三壯又熬鹽熱尉小腹冷復易亦治小便血石淋又名沙淋瓦松煎濃乘熱熏洗小腹約兩時即通又地榆煎浴腰腹又生蔥頭同生鹽搗融敷肚臍上其砂自出血淋麻根發灰車前子地骨皮煎湯洗冷淋寒戰後溲用胡椒煎湯浴腰腹急淋陰腫泥蔥半斤煨熱杵爛貼臍上前陰男女交感樂極精脫而死用人抱起坐之以人之口氣呵其口又恐不能入喉急以筆管通其兩頭入病人喉內使女子呵之不必皆妻妾也凡婦人皆可盡力呵之雖死去亦生陽痿蛇床子煎濃湯浸洗又新鳳仙花子又名急性子研末三錢鴉片煙二錢蟾酥八分真麝香二分須於做丸時加入共為一大丸外用蔥白捶爛包裹再加紙一二層用水泡濕放炭火中煨熱換紙再煨煨至七次去蔥紙將藥改為小丸如緑豆大每於將睡先一二時取二丸用酒化開敷陽頭上半時俟陽物舉起將藥洗去然後行事堅而且久並能種子其效如神又大附子一個重一兩五六錢者鴉片煙五分硫黃末二錢穿山甲二片炙黃研末將附子挖空以各藥納入用好酒半斤和附子用文武火煮乾取出搗爛如膏先用麝香三釐放臍眼內再將此膏貼上應驗無比癆病火動陽物易舉皮硝放手心內兩手合住其硝自化陽物即不舉矣以燒酒和泥敷陰毛上陽物即復舉總之陽舉即相火妄動其病難愈必致貪色亡身不如不舉安心靜養為妙保身惜命者宜加意焉陽物被捆腫大一小兒被人用頭髮繫住龜頭少時氣閉腫大無法可解後將小兒坐冷水中即刻縮小去發而愈飛絲纏繞陽物腫痛不已威靈仙二兩煎濃汁泡洗陰頭生瘡名下疳鱉甲燒灰敷百藥不效用此如神又五倍子研末絲瓜搗爛包敷雖腐爛不堪亦效又爐甘石一兩火煅醋淬再煅再淬五次兒茶三錢共研末香油調敷又先用甘草銀花蔥頭煎湯洗淨用生橄欖核一個無則以鹽橄欖核煮淨鹽味代之燒存性加頂上梅花冰片一分共為細末麻油調塗雖臭爛不堪敷之即效又白蜜調生甘草末塗或用蜜煎甘草塗之又螣黃磨油搽之又鰣魚鱗焙乾煅研白色名白龍丹敷之即愈又土牆上白螺螄殼煅存性一錢五倍子燒灰二分燈草灰黃柏灰兒茶各五分輕粉四分牛黃冰片各五釐上為細末先用皮硝湯洗次用土茯苓湯洗後將藥敷患處又大紅絨一錢冰片三分鐵鏽一分鳳凰衣五分煅存性血竭一錢共研極細末敷患處效又下疳陰癢用生甘草煎濃湯久久熏洗外以海螵蛸去甲研末摻之立效瀉燭疳半邊溜爛者是又名蠟燭瀉從內爛出者將人腳跟上老皮不拘多少瓦上焙脆為末黃柏末用豬膽汁拌曬乾再研摻患處烏金紙包頭又蜒蝣雄黃各三錢同研敷龜頭腫痛兒茶冰片研細各三分甘草水洗後搽玉莖濕癢肥皂一個燒存性香油調塗陰囊腫痛煨蔥入鹽杵爛塗又以醋和麵塗之或炙令熱尉之又釜月下土以雞子白和敷之效又蔥白乳香搗塗即時痛止腫消又陰腫核痛人所不能治者蔓菁根搗爛敷之陰腫如斗取莧菜根搗敷之又搗馬鞭草敷之又痛甚者雄黃甘草各一兩白礬二兩共為細末每用一兩滾水五升煎至三升沖和洗患處良久再暖洗至冷候汗出即瘥並治疝疼腎子疼又腫痛如燈籠者灶口黃土蒼朮炒牡蠣煅各等分為末用紗作袋撲之腎子腫痛牛屎燒灰酒和敷之即愈勿令病人知腎子偏墜作痛熱而睪丸舒縱也大黃和醋塗之又棉花子煮湯入甕將腎囊坐入甕口俟湯冷止一二次散其冷氣即效並治陰囊腫大潮濕繡球風五倍子松蘿茶各五錢為末茶調敷又杉木焙灰熟雞子黃炒油調搽陰囊腫如水晶腎子腫大潮濕灶心土三升研碎炒熱鋪凳上再以川椒小茴香各一兩研末撒在上面將陰囊熏燙冷則再炒三次愈陰囊忽然腫大多因坐地所受風濕或蟲蟻吹著所致蟬蛻五錢水煎洗腫處二三次即愈又雄黃枯礬茶調敷隨敷隨效腎勞熱陰囊生瘡麻黃根石硫黃研各三兩米粉五合上共搗研如常用粉法拓患處粉濕更拓之陰囊生瘡花椒七粒蔥頭七個煎濃湯洗之又緑豆粉蚯蚓糞等分研塗之陰瘡爛痛杏仁燒黑研成膏頻敷陰癢生瘡胡麻嚼爛敷之又煮桃皮和黍米汁洗之又爛煮黃柏洗之又用白蜜塗之又黃連黃柏各等分為末先煮肥豬肉湯洗之然後以藥敷陰囊爛盡止留二子者鳳仙花子甘草等分為末麻油調敷即便生肉陰囊油濕以飯湯洗之後用六一散數錢加冰片一分搽之二次即愈陰囊濕癢麩炭紫蘇葉共為末撲之又荷葉三個吳茱萸三錢煎湯洗之又地骨皮二兩吳茱萸五錢煎湯久久熏洗三五次愈陰下濕癢槐白皮炒煎水日洗又蒲黃末敷數次愈又礬石熬令汁盡蛇床子黃連各三分為末盛疏布袋中撲患處腎風陰癢以稻草燒皂角煙燻十餘次即止腎囊癢乾者用油核桃研油潤之濕者用爐甘石灰蛤粉末摻之又幹荷葉摘碎以口水潤軟貼癢處立效又艾葉蘇葉明礬各三錢煎水洗之陰奇癢難忍用青夏布舊蚊帳燒存性麻油調搽即愈並治走遊風各種疝氣初起寒熱疼痛如欲成囊癰者新鮮地骨皮生薑各四兩共搗如泥以絹包於囊上其癢異常一夕即消永不再發濕疝陰丸作痛蘄艾紫蘇葉烘川椒炒熱各三兩上三味拌勻乘熱絹袋盛夾囊下勿泄氣疝氣偏墜用肥薑切片鋪湊板上上堆蘄艾一尖點火燒之候將完即乘熱帶火連姜並艾搗極爛將鮮菜葉一大片放手掌內即以姜艾攤勻菜葉上用手向腎囊底下托之初時其冷如冰須臾滾熱通身出汗而愈又牡蠣煅良薑共為末用津唾調塗之立消又苦楮樹葉半斤煮滾放壇內先熏後洗每日數次甚效又大茴香炒熱作兩布包更換尉之又生石菖蒲柑子葉京茴香各一錢搗極融爛置酒壺內加開水一碗將壺入鍋內隔水燙滾於患處隔衣頻頻尉之止痛如神又萆麻子七粒和飯搗為丸敷腳心左痛敷左右痛敷右雙痛雙敷又凡患偏墜如服荔枝核小茴香等藥不效者此熱症也取芙蓉花根要丹心者用皮搗極融爛加大黃末敷患處二三日必愈小腸氣川楝子吳茱萸小茴香共研末用飛面一合和藥盛注於紅色綢肚兜內束小腹上藥末易於垂下須細針密線橫切為妙蚯蚓呵腎鹽水湯溫洗數次即愈腎莖肛門搔癢陳葫蘆燒存性研細末撲之效陰毛生八腳蝨白果嚼融擦之又桃仁嚼融擦之房勞陰毒胡椒七粒蔥心二寸半麝香一分搗爛以黃蠟溶和做成條子插入陰內少頃汗出即愈便毒腫痛初起時以肥皂搗爛敷之甚效又生菖蒲根搗敷之又皂角炒焦水粉炒等分碾末以熱醋攤貼患處頻以水潤之即效魚口生左胯名魚口右胯名便毒初起未成膿者以五倍子炒黃研末入百草霜等分以醋調塗患處一日一夜即消魚口便毒初起便如小核桃用瓦松花搗濃汁敷上即效或焙乾為末以雞子清調敷不出膿自效後陰大腸脫肛不收蝸牛瓦上焙枯研末一兩桑樹蝸牛更好豬油調敷立效又甲魚頭焙枯研末麻油調敷或以紙托患處又大螺螄一個入頂上梅花冰片一分即時水出敷之神效又赤石脂伏龍肝枯礬共為末敷之又熬石灰令熱布裹尉之隨按令入冷即易又蟬蛻末菜油調敷立效又魚腥草即蕺草三兩擂如泥先以朴硝水洗肛瘡用芭蕉葉盛藥坐之自入又豬脂一兩煉去渣入蒲黃末一兩調勻塗肛即縮又苧麻根搗爛煎湯熏洗又胡荽切一升燒煙燻之即入又名縮肛散鱉頭一個煅枯礬三分五倍子三分煅共研極細末摻之又名倍礬煎五倍子三錢白礬少許共為末水一碗煎湯洗之立效若婦人産後脫肛五倍子末摻之小兒脫肛凡小兒脫肛不收久則堅硬難入用連須蔥斤許煎湯入桶內坐上乘熱熏之隨後慢慢洗軟再照以上各方用藥敷之即上肛門忽腫此肺胃濕熱下注也帶殼蜒蝣十數個即蝸牛搗爛塗之即消肛門腫痛馬齒莧葉酸漿草等分煎湯熏洗一日一次效並治臟毒下部蟲䘌梅葉桃葉一斛杵爛蒸熱納小器中隔布坐蒸之蟲盡死又杏仁杵膏頻敷又蟲癢者蒸大棗取膏以水銀和捻長三寸以綿裹夜納下部中明日蟲皆出下部卒痛如鳥啄之狀赤豆大豆各一升蒸熱作二囊更互坐之即止下部疳瘡生白果杵塗之肛門生瘡雞肫皮燒灰研末候冷乾摻之自愈肛門鼠瘻蜘蛛絲纏之即落又蜣螂燒末醋和敷之又未成膿者以柏葉搗塗熬鹽尉之即消臟毒肛門突腫大便祕結肚腹不寬小水不利木鱉肉五個研如泥安盆內以沸湯沖洗另用木鱉研成泥少許塗患處效又象糞煎水先熏後洗並治痔瘡腫痛治五痔方取桃根煮洗之又取槐根煮洗之又十年者塗熊膽取瘥止一切方皆不及此神效又桃葉一斛細糠胡麻各一斗熬上三味合蒸之取細糠熟為度納小口甕中將肛門坐桃葉氣熏入蟲盡出甚效治痔方生槐皮十兩削去黑皮搗熟丸如彈子大綿裹納下部中大效又鯉魚腸三具以火炙令香用綿裹納下部中一食頃蟲當出魚腸數數易之盡數枚當瘥又鳳尾草熬水洗之又以肥大棗一枚剝去赤皮取水銀掌中以唾研令極熟塗棗瓤上納下部中瘥又冬瓜煎湯洗之又皮硝五錢入小便壺內開水衝出熏洗之又鬱金為末水調敷之又芥菜末搗餅頻坐之又胡黃連末用鵝膽汁調敷又木槿根煎湯先熏後洗又五倍子三個皮硝一撮水二碗煎濃先熏後洗一二次即愈又枯痔法紅礬五釐蠍梢七個白明礬五錢共入銀罐內文火煅末入硃砂四分冰片五釐同研真麻油調塗十八日瘳此方乃專門醫痔者所不樂聞也內痔內痔落下用大甲魚頭一個煅為末塗痔上即刻收進甚效又內痔不出以草烏為末口水調點肛門痔即拔出乃可用藥敷治又蜒蝣蟲七個銀硃細末一兩入罐封口放陰處七日啓視化為水以濕朱搽患處久搽自愈腸痔以穀子燒末敷之深者導之又搗槐白皮作屑粉以導之又以蘩蔞燒灰礬石熬和為粉粉之又腸痔出血者蔥白三斤煎湯熏洗立效止痔下血蜒蝣一條用鹽泥裹煨通紅去泥用硼砂硃砂雄黃冰片共為極細末入龍骨少許更妙大便時乘其脫出以細草紙盛藥少許托之使入大效痔痛難忍蝦蟆頭陰乾燒煙燻之奇效又蜒蝣搗爛和陳墨敷之極效痔漏腫痛隔年風乾橙子於桶內燒煙燻之又先以木鱉子煎洗旋以蔥涎和蜜敷之其冷如冰即愈痔癢痛如蟲齧菟絲子熬令黃黑末以雞子黃和塗之又蝟皮燒灰敷之又杏仁熬令黑搗膏塗之翻花痔木瓜為末鱔魚涎調貼之紙護坐板瘡疥初起者用芫花川椒黃柏煎水洗即消又絲瓜皮焙乾為末燒酒調搽又海螵蛸五錢雷公藤三錢共為細末擦之干則以菜油調敷懸癰即騎馬癰紡車上弦線燒灰麻油調敷已潰者乾摻亦效又雄黃二錢密陀僧一錢研細末水調敷下部濕瘡馬齒莧四兩研爛入青黛一兩和塗二便大小便閉塞不通以病人坐桶上燒皂角煙燻自通又雄鼠糞兩頭尖者是研末納臍中又獨頭蒜去皮綿裹納下部氣立通又全蔥一斤不洗生薑一塊淡豆豉念粒加鹽一匙共搗爛作餅烘熱扎臍上久之氣透自通又食鹽炒熱候冷填臍中艾灸七壯立通又男女大小便不通危在頃刻者用田螺十個蔥白七根麝香五分輕粉一分共搗成泥敷臍上隔布數層以尉斗尉之立效大小便熱結不通大田螺二個搗爛加青鹽三分貼臍下一寸三分即通大便不通用麝香包肚臍內一二時即通又生薑削長一寸塗鹽納下部即通又豬膽汁灌入肛門即通加好醋少許治大便熱閉更妙又甜瓜蒂七枚研末綿裹塞下部即通又氣奔欲死者烏梅十個湯浸去核丸如棗大納下部少時即通大便虛閉張仲景傷寒論云陽明病自汗小便反利大便不通者津液內竭也用蜜二合銅器中微火煎之乘熱捻作條或以好蜜煎膏滴冷水中即硬為度大如指長寸半許候冷塗油納糞門中少頃即通或加麝香細辛皂角末和勻捻成條浸冷水中候硬推入穀道凡年老氣衰婦人新産及久病之後下不可不下不可則宜用此其效甚速並治大便熱閉小便不通此症寒熱虛實不同治無一定每用一方俟過一二時不效方可另治不得性急亂投自誤豬尿脬一個用鵝毛管插入尿脬孔內線扎定用口吹氣脹滿以手按住管口將管口插入小便孔上用手捻氣透入孔內小便即出諸藥不效者此法最妙婦人更效又甘遂末水調敷臍下一寸三分內以甘草梢煎湯飲之又韭白煎濃汁洗臍下一寸三分即通又萵苣菜搗敷臍下一二時即通神效又豬膽一個留汁以陽物插入膽中少傾汁入自通婦人以膽汁滴入陰中又苧根洗淨搗攤絹上貼小腹連陰際須臾即通又皂角蔥頭王不留行各數兩煎湯一盆坐浸其中熏洗小腹下體久之熱氣內達即通又白鳳仙花連根葉熬水乘熱洗腎囊陽物及兩胯內即通又黃酒浸腳又萆麻仁三粒研細入紙捻內插入莖中即通又半夏末加麝香少許填臍中用蔥白田螺二味搗成餅封臍上以布捆定下以皂角燒煙熏入陰中自通婦女用皂角煎湯洗陰戶內又蝸牛搗貼臍下一寸三分以手摩之加麝香少許更妙又熱結不通刮滑石屑水和塗少腹及繞陰際干復塗之又遍身水腫欲死者以青布十七層貼臍下用滾燒酒一大壺尉之小便閉脹蔥白三斤銼炒帕包二個更互尉小腹老年小便閉塞上肉桂五錢為末納入臍內以蔥和麵作餅蓋之扎好小便立通小便轉脬蔥管吹鹽入玉莖內甚效又布包蒲黃裹腰背令頭至地數次取通小便出血萵苣菜搗敷臍上腫毒未潰小便不通用蔥切入麻油煎至黑色去蔥取油時塗腫處即通足腳氣腫痛白礬二兩地漿水一大碗於淨土地上掘二三尺深用新汲水傾入攪濁少俟澄定取半清半濁者吹去浮沫用新杉木三四片煎六七滾用杉木桶新者更佳盛一半浸腳留一半徐徐添入上用衣被圍身使略有微汗洗完隨飲薄粥如一次未愈再洗一次照前方加硫黃三錢無不愈矣又以鹽搽痛處少時用熱水洗之神效又用紫荊莖於壇中燒煙熏湧泉穴及痛處使汗出愈又皂角赤小豆為末酒醋調貼腫處又水煮杉木或用杉木刨花浸捋腳去腫滿甚驗又白芷芥子等分為末薑汁和塗之又取萆麻葉蒸裹日三易即瘥腳氣走疼蘿蔔煎湯洗之仍以蘿蔔乾為末鋪襪內腳氣腿脛紅腫枸杞葉鳳仙花葉共煎濃湯熏洗並生搗融敷又大田螺搗爛敷之並治腳氣上衝腳膝浮腫荷葉心藁本等分煎湯淋洗腳筋攣痛木瓜數枚酒水各半煮爛搗膏乘熱敷痛處綿裹之冷即換日三五度足上轉筋肝血虛煩所致治有三捷法一則手拔玉莖婦女則手拔乳根二則腳踏實地三則口念木瓜又黃蠟半斤融化攤舊綢上隨患大小乘熱纏腳須當腳心便著襪裹之冷則隨換並貼兩手心又以舊綿浸醋中甑蒸熱裹之冷即易勿停取瘥止腿足麻木用木瓜一個黃豆半升地骨皮透骨草艾葉川椒槐條各二兩煎湯熏洗最效老人腿腳疼痛燒酒糟初出時乘熱將腿足插入熏浴數次即止赤遊風腳腿紅腫芭蕉根搗爛塗之效流火鮮紫蘇鮮鳳仙花二味洗淨連根葉搗爛故木盆內以滾水衝入將腳架盆上熏至可洗以軟綿洗之立愈數十年者不過三四次不發矣又夏枯草一斤水二碗煎放甕內熏之又馬前子磨水塗二次止痛而愈膝上生癰名牛頭癰連須蔥頭二三兩切碎用糯米飯乘熱拌敷重者五六次亦消而愈臁瘡棉花子炒脆取末填滿瘡內扎好不可開看自然收功雖三年貼骨之瘡亦驗過又蒜杆燒灰香油調塗又人乳桐油等分和勻以鵝毛掃塗又豆腐渣炒熱敷冷即更換以愈為度又木耳瓦上焙枯研末敷又名夾紙膏樟腦三錢銅緑一錢用豬板油和藥搗爛以油紙夾之貼患處一二日翻轉貼三四日膿盡而愈如四日後膿尚未盡再換一紙即效爛腿水龍骨研碎桐油調敷又黃丹三錢白芷焙五錢研末用麻油調勻攤油紙上雙摺將針刺細孔貼患處兩頭只用帶拴住使得透氣一日一換效寒濕腳痛川椒一兩蔥一把姜三兩水數碗煎湯熏洗腫消痛止兩足痛如刀割先用生薑切片蘸香油擦痛處隨用生薑火燒熟搗爛敷患處其痛立止脫疽此症生於腳趾漸上至膝色黑內痛不可忍逐節脫落而死亦有發於手者用土蜂窠研細醋調搽應手而愈真神方也腳丫奇癢難受用硫黃擦之擦後再用硫黃厚敷布包穿襪一日一換數日斷根切忌用手搔擦腳丫爛瘡陳火腿骨米泔水漂盡鹽味燒枯研末敷腳指縫爛五倍子煅三個冰片五釐茶油調敷又鮮鵝掌黃皮陰乾燒存性為末摻之極效又桂圓核燒灰摻之立效又陳松蘿茶末摻之腳上皮蛀生水孔而皮濕爛者用豆腐渣不落水者貼三日即愈腳疰麥柴稈煎湯頻洗腳冷如冰生附子二錢好酒麴三錢共為末燒酒調敷足心甚妙腳多汗濕楊花鋪鞋及襪內穿之腳底開裂白芨刮取細末用口水調敷遠行腳上成泡生面和水調塗遠行腳腫草烏細辛防風各等分共為末作護膝或襯鞋底併除膝風及腰冷痛又蘿蔔子炒研末白礬研末共鋪鞋底遠行腳不作痛極效釘鞋打傷足跟羊皮金面貼傷處過宿即愈又腳脛被靴山擦破者用白蠟五錢藤黃一錢五分入麻油融化塗傷處即消腳鹼荸薺半個貼患處過夜次晚再貼五六次其鹼連根脫出又蔥頭荸薺搗汁一碗煎再取松香四兩麻油半斤熬至滴水成珠方入前汁攤膏貼即落腳生雞眼真烏梅肉搗爛入醋少許加鹽水調勻貼之即消又荸薺一個蕎麵一錢共搗融貼上一晝夜自落又地骨皮紅花共研細敷之立愈又生白蘿蔔口嚼如泥敷之止痛如神嵌甲作痛不能行履濃煎陳皮湯浸良久甲肉自離輕手剪去以虎骨末敷之即安又胡桃皮燒灰貼疔毒蜘蛛拔毒法先將疔頭用瓷片刺破尋活蜘蛛一個越大越好放疔瘡上蜘蛛一見自能奔往吸拔其毒少時蜘蛛不動即取放冷水中自活如疔未愈可用蜘蛛再行吸拔或另取蜘蛛用之以毒盡為止無論疔在何處雖毒重極痛不省人事命在垂危立可回生此急救第一良法凡手指生蛇頭瘡及毒蛇毒蟲咬傷皆可照此拔毒取疔膏乳香一粒麝香米大一粒黃連末連翹末桃仁二個去皮同蝦蟆肝腸肺三味共一處入乳鉢內搗如泥白皮紙一張攤貼患處三四日連疔揭去拔疔根法疔毒重者愈而復發此疔根未出之故若不急治再發則根愈深而難治矣用萆麻子一粒去油乳香一分去油共搗爛用飯和餅貼之少時疔根自出又蔥白加蜜捶融將疔刺破敷之如人行五里根自出消疔人指甲炙為末放患處將核桃平破取肉嚼爛安半殼內合住不可露氣一飯頃即消治疔初起生山藥同白糖搗爛塗敷即消治疔各方生黃豆嚼爛敷之極效又黃色溏雞糞厚敷四圍將疔頭挑破留頭不敷甚效又用煙桿中煙油厚敷四圍留頭不敷少刻疔破出水而愈奇效如有紅絲者用煙油離絲三分處敷之絲即不走又灶上蟑螂不拘多少搗爛敷之其疔根自出又臭蟲同米飯搗勻塗疔上能立拔疔根外出又生半夏石灰等分搗末敷瘡上又赤小豆花為末敷之又馬齒莧和梳垢封之又取患者耳垢齒垢刮手足指甲屑和勻如豆大放茶匙內燈頭上炙片刻作丸將銀針挑破疔頭貼上外覆涎濕綿紙痛立止真妙方也又青石末同荔枝肉杵爛將婆雞糞調幹塗其根自拔神效非常又荔枝肉白梅肉各三個搗餅貼之根即出又幹姜胡椒龍骨斑蝥去足翅熬皂莢炙去皮子各等分搗篩以酒和封瘡上日一敷之又先刺瘡出血以海螵蛸末搽之其疔即出又馬齒莧二分石灰三分搗勻以雞子白和塗之又皂莢子中仁研末敷之數貼五日愈又刺破以老蔥生蜜杵貼兩時疔出用醋湯洗之神效又蒺藜子一升熬搗以醋和封頭上拔根又名大戟膏真紅芽大戟用整枝者溫茶洗淨去心嚼融敷之立刻止痛而愈再發再敷收功嚼時藥汁不可咽下並治一切惡瘡及陰疽甚效又苦蕒白汁塗之拔根青苗陰乾冬月水調敷之亦效又面和臘豬脂封之良唇口疔凡口唇生疔看大腿彎中如有紫筋用銀針刺出血即愈又一人唇口生疔七個頭腫如斗百藥不效後遇一醫云此名七星趕月用蛔蟲搗爛敷之頃刻瘡口出黃水腫消神清次日全愈如無蛔蟲以五穀蟲一錢瓦上焙研末白礬蟾酥各三分用燒酒融化調勻敷疔上少刻疔亦破流毒水而愈又雄雞冠血點上神效又生蜆去殼搗融敷即效又烏色草魚去鱗取皮切片貼之隨貼隨干干則換貼貼至數十次即破口而愈矣又大蝦蟆一個取肝貼之立消兼治面上生疔對口疔等症面疔飯蠅七個冰片一二釐同研爛敷之即不走黃鼻內生疔爛黃雞糞荔枝肉同搗爛塗上即愈又用花盆中青螺即鬼螺螄二三個同鹽搗塗立效眉心疔粗草紙上揀內有米穀取二三十粒去殼將米研細和砂糖調塗疔上數次即愈紅絲疔此疔最易走黃犯者用針挑斷其絲且拔去發中紅頭髮一根將多年糞坑上碎木椽子煅灰研細用餳糖拌塗疔上露出疔頭疔毒拔出無事若不急治隔日即死又此疔流走最速生於足者其紅絲漸長至臍生於手者紅絲漸長至心生於唇面者紅絲漸長至喉至則不可救矣手足兩處可用頭髮離絲一二寸遠緊緊捆住並將絲頭刺破或用燈火或用艾火在絲頭燒之絲即退散而愈不散再燒以散為度其效如神又蟑螂一個去頭和青糖搗塗即效魚子疔活蟶殼煅用豬苦膽汁調塗魚臍疔寒食餳即飴糖塗之良乾者燒灰又瞿麥燒灰和麻油敷之效水疔蝸牛同菊葉搗爛敷之無菊葉以野苧麻頭代之又用鰣魚腮下近腹處有划水二瓣瓣間有長鱗二瓣最佳但難得今人以背上大鱗代之貼上即消水疔暗疔水疔色黃麻木不痛暗疔瘡凸色紅使人昏狂並先刺四畔後用銀杏去殼浸油中年久者搗罨之指上蛇頭疔又名天蛇頭生各指頭又足指頭生者亦是鳳仙花下半截連根用不用水洗和甜酒糟搗融敷甚效又蜈蚣焙枯為末豬膽調搽甚效又雞蛋一個穿一小孔入信石一分套指頭上熱則再換立刻止痛如神真仙方也又雞子開一孔將指入內待蛋化水又換一個如此三枚必效又活鰍搗敷又雄黃枯礬等分研末用麻油或醋調敷又風菱角燈火上燒存性研末香油調敷未潰即散已潰者止痛立愈又痛臭甚者黑豆生研末入繭內籠之疔毒痔瘡田螺入冰片化水點之疔瘡走黃陳年苔菜研末敷上即消腫收口而愈試過無不效又白梅乾肉無白梅用烏梅肉此味能拔疔根醃荔枝肉加銀硃少許共搗爛溏雞矢拌勻留頭敷效按走黃為疔瘡至危之症當內外兼治為是速取芭蕉葉或根搗汁灌之或服別藥專憑外治恐難全效癰疽烏龍膏治一切癰腫發背無名腫毒初發焮熱未破者取效用隔年陳小粉愈久愈佳以鍋炒之初炒如餳久炒則幹成黃色冷定研末陳米醋調成糊熬如漆瓷罐收之用時攤紙上剪孔貼之即如冰冷疼痛即止少頃覺癢聽其乾燥久則毒自消藥力盡亦自然脫落矣治癰腫白蘞黃芩烏頭泡各等分搗篩末和雞子白敷上即愈又已潰者貼之黃連黃柏地榆白芷各二兩共搗為末雞子白和塗布敷癰上對瘡口穿布令疏氣又生黃豆浸胖搗塗又豬膽汁和芥子末貼之日三上豬脂亦可又蔓菁葉不見水燒灰和臘豬脂封之又初起者緑豆粉炒黃黑色入牙皂一兩同研米醋調敷皮破者油調敷之一切腫毒萆麻仁搗敷即止又蔥汁敷之日四五度又醋調大黃末塗又商陸根和鹽少許搗敷日再易又初起用芭蕉葉尉斗內燒存性入輕粉麻油調塗一日三上或消或破皆無痕又芭蕉研末和生薑汁塗之又萍草搗敷之又獨頭蒜一枚津唾磨鞋底泥箍之三五次即消多骨癰紫玉簪根搗爛敷之其骨自出快馬癰山藥磨沙糖水搽圍即散決膿妙法治癰膿不出用人乳汁和麵敷之一切癰疽初起用乾薑一兩炒紫研末醋調敷四圍留頭自愈又赤小豆四十九粒為末水調塗無不愈者但其性黏干則難搗入苧根末則不黏此法尤佳或用雞子清調敷又瘡腫者鹽白梅燒存性為末入輕粉少許香油調塗四圍已潰未潰均可用下方同又黃連檳榔等分為末雞子清調搽之又癰疽不斂瘡口太深用絲瓜搗汁頻抹之瘭疽熬蕪菁子熟搗綿裹敷之勿止又酒和麵敷之又以豬膽敷之良又鯽魚三寸長者亂髮如雞子大豬脂一斤煎成膏塗之骨疽豬脂和楸葉搗封之又搗白楊葉下篩敷之疽瘡骨出黃連牡蠣各二分熬為末先以鹽湯洗然後敷之疽潰後方用鹽湯洗拭後燒皂角灰粉之良又以牛耳中垢敷之良治癤燒葛蔓灰封上自消又牛糞封之佳又鼠黏根葉貼之又水和雀糞敷之又生椒末釜下土等分醋和塗之一方有曲末又已破用益母草搗敷諸瘡楊梅瘡雄黃一錢五分輕粉一錢杏仁三十粒去皮共為末用雄豬膽汁調塗又兒茶杏仁霜各一錢輕粉五分冰片三分用鵝膽調點一次過夜即脫靨一方惟用杏仁霜輕粉二味鵝膽調點之楊梅瘡癬水萍煎汁浸洗半日數日一作天行熱氣病豌豆瘡濃煮黍穰汁洗之又瘡若黑者搗蒜封之又若赤黑如疥大者煎羊脂摩敷之浸淫瘡生鯽魚切片鹽搗貼頻易血風瘡舊傘帽壞皮掌焙灰桂花油調敷神效黃水瘡真柏油熬稠塗又芋苗曬乾燒存性研擦又木槿子燒存性豬骨髓調搽之又老菱殼燒灰以小磨麻油調塗又石膏煅龍骨煅松香枯礬各三錢共研細用煮熟雞子黃熬油和敷之又頭面俱生者蒼朮糯米粉等分均炒燥研勻摻之天泡瘡荷葉貼之又絲瓜葉搗汁塗之又生百合搗塗一二日即安又蓮蓬殼二枚煅存性研末以井泥調敷又生蠶豆莢殼炒黑研末麻油調塗膿窠瘡用火紙卷雄黃熏被三次即愈臨臥忌熏又大風子油百粒蛇床子五錢雄黃二錢枯礬花椒各三錢共為末燭油豬油各五錢同搗爛熔化調塗又菖蒲末鋪席臥並煎水洗數日愈月蝕瘡燃燭照瘡使燭之熱氣相及瘡即愈又茱萸根地榆根薔薇根各等分為末作湯洗瘡取藥塗之日三疥瘡枯礬滑石各五錢硫黃三錢共為細末豬油同研糊塗極效又紅棗三枚蘄艾雄黃花椒各三分共燒爐內熏焙衣被俟冷透穿蓋免受火氣甚效又風化石灰和醋漿水調塗隨手而減石灰淋汁洗之甚效一切瘡疥桂圓核煅存性麻油調敷諸毒惡瘡蟑螂搗石灰敷之蠼螋尿瘡繞身匝即死以蒺藜葉無葉用子搗敷之螻蛄漏瘡茜根燒灰千年石灰等分為末油調敷五種瘻疾芥子末水蜜和敷干即易之赤遊火丹新生荷葉搗爛入鹽塗之又麻仁搗末水和敷之又赤小豆末雞子清稀調塗之熱毒丹瘡慎火草搗汁拭之日夜一二十遍又浮萍搗汁遍塗之疥癬滿身不可治者何首烏艾葉等分煎濃湯洗浴甚能解痛生肌治癬方初起用海螵蛸一塊常向患處時時擦之效又榖樹脂抹之又白芨木鱉子土槿皮白糖各等分為末醋調塗又巴豆五六個去皮打碎包絹內擦之不可擦好肉上身面上如錢大者擦之如神又珠蘭花葉時時擦之半月斷根又荔枝核磨醋將癬抓破搽之雖痛不妨數日即愈再發再搽斷根又用新棉花扯如紙薄一層量癬寬大將綿花鋪貼用火向花上一點頃刻燃盡當即止癢且並不焦痛不須用藥極簡極效綿花須用彈過者倘再發照治一回斷根陰癬土槿皮檳榔各兩文切片用滴花燒酒五文將二藥浸三四日候酒色變赤而膩蘸塗患處痛癢立止癬亦即愈又明礬生熟各一錢輕粉二錢銀硝三分共研將土大黃根搗爛布包蘸藥末擦之又蛇床子豨蘞草川芎川柏銀花共煎滾入乾淨便桶內以身坐上熏其熱氣牛皮血癬枯礬水銀各二錢川椒炒一錢用土大黃根鹽豬油同搗爛敷患處即效漆瘡韭菜搗汁入燒酒少許塗之又幹荷葉煎湯洗之又石灰水拌敷一日除根又生蟹黃塗之又以馬尿洗之又煮柳葉湯適寒溫洗之柳皮尤妙又麻油調鐵鏽塗之又濃煮杉木汁洗之暑月痱瘡俗名痱子緑豆粉二兩滑石研末一兩和勻撲之一加蛤粉二兩又冬瓜切片摩之凍瘡剝辣茄皮貼之又方頭黃色蚱蜢風乾煅研香油調塗摻亦可又蟹殼燒存性研末香油調塗又凍在臉上用活雀腦塗之立效又凍在手足白蘿蔔一個熱柴火內煨熟去皮擦之又橄欖核燒存性研末加輕粉少許香油調塗良凍瘡手足指欲墮生薑搗自然汁熬膏塗又黃蠟濃煎塗之又以蚶子殼煅研極細麻油調塗濕則干糝又馬糞煮水將凍指浸半日冷加熱水凍瘡裂坼人乳調黃柏末塗之又甘草煎湯洗次以黃連黃柏黃芩各等分研末入輕粉麻油調敷又藕蒸熟搗爛塗之瘤痣治瘤方水銀硼砂各一錢兒茶血竭各三錢麝香冰片各三分各為細末將此藥摻於瘤之根處隨擦隨落根小者無不落也又極細鐵屑醋拌放銅杓內煅干則再拌如此三次研細再用醋調敷便覺患處不甚適意過一宿剝去再敷以平為度又用竹刺將瘤頂稍稍撥開油皮勿令見血細研銅緑少許放撥開處以膏藥貼之又生馬前子以荸薺汁磨塗患處早晚二次軟者不周月而愈粉瘤天花粉一兩陳壁土五錢穿山甲川貝母去心各三錢共為末和勻擦膏藥上不拘何膏貼之即穿出粉滓而愈眼皮生瘤櫻桃核磨水搽之其瘤漸漸自消肉核真烏梅去核燒存性研末搽數日即消又生蘿蔔皮貼之連貼數次即愈疣瘊又名瘊子拔之絲長三四寸薑汁和好醋時時搽之又地膚子白礬煎湯洗數次即消又以墨塗之不過五度瘥又以屋漏下水塗疣上又松香柏樹枝上油和勻敷之過夜即落又牛口涎時時塗之即落又杏仁燒令黑研如膏塗之令瘥止肉痣小黑子是用針挑破以鹼水泡石灰點之即消血痣初起如痣色紅漸大如豆觸破時流鮮血以黃鱔血同蒜汁好墨汁頻塗之效血出甚者宜內服涼血地黃湯又血痣挑破血出不止者鰣魚鱗貼之即結痂而愈除痣方取桑條燒灰淋汁入石灰熬膏自己唾調點之自落又糯米百粒石灰拇指大一塊巴豆三粒去殼研為末入瓷瓶同窨三日每以竹籤挑粟許用鹼水點上自落又杏仁為末雞子清調點一宿自落又桑柴灰風化石灰各一斤鮮威靈仙六兩煎濃汁淋二灰取汁熬成稀膏瓷器收藏用點患處不必挑破應手而除並治疣痣及息肉雞眼諸傷天下第一金瘡藥凡刀斧損傷跌撲打碎敷上即時止痛止血更不作膿勝於他藥多矣其傷處不可見水公豬油二十兩松香黃蠟各六兩麵粉炒篩四兩樟腦三兩麝香冰片各六分血竭兒茶乳香箬皮上烘去油沒藥同上去油各一兩以上藥研極細先將豬油松香黃蠟三味敖化濾去渣待冷再入藥末攪勻瓷器收藏不可泄氣又名桃花散止血定痛價廉功敏極宜制送用陳石灰二升愈陳愈佳大黃四兩切片同炒俟灰成桃花色去大黃將灰細篩入瓷瓶過月餘方可用又千年石灰韭菜共搗成餅貼牆上陰處乾透聽其自落研篩極細收藏血流不止摻上立愈箭鏃傷頭上黑蝨及人牙齒同研塗之即出又栝蔞根搗敷之日三易自出並治竹刺入肉中毒箭以犀角刺瘡中立愈又搗苧根罨之鳥槍傷凡槍子打入皮肉用生南瓜切片貼患處即出南瓜瓤敷之亦佳又泥鰍搗爛敷之被斫斷筋旋覆根搗汁瀝瘡中仍以渣敷之日三易半月斷筋便續又白蠟合歡皮各五錢研融調敷傷處極效跌打損傷閃挫初時即於無風處將紙捻觸鼻內用力打嚏二三十次則氣升而痛自止又緑豆粉炒紫色新汲水調敷以杉木皮縛定又胡椒黃蠟各二兩公雞一隻去毛共搗爛敷患處如癢即愈頭面跌撲青紫生半夏末醋調敷之神效一方用水調敷打傷眼睛生豬肉一片以當歸赤石脂二味研末摻肉上貼之拔出瘀血眼即無恙閃拗手足生薑蔥白搗爛和麵炒熱罨之踢傷冬青葉醋煮數沸略滴麻油少許取葉換貼抓破面上皮生薑自然汁調輕粉末敷之無疤痕抓破腎囊卵丸脫落懸掛未斷者即教人慢慢托上多取壁錢敷貼患處日漸就安其囊如故接骨方山梔五分生研末飛羅面三錢用薑汁調和塗患處一日夜皮肉青黑是其驗也或用水調搽干則掃去又用市鎮上乞小兒破鞋一隻燒灰白麵等分好醋調成糊敷患處以絹束之杉木板夾好須臾疼止骨接有聲甚妙損傷碎骨在內作膿田螺搗爛加酒糟和勻敷四圍中留一孔其骨即出腦破骨折蜜和蔥白搗勻厚敷立效此藥切忌入口誤斷指頭降香研末摻之包以絲綿七日忌落水冒風一次即痊又真蘇木為極細末摻於斷指間接定外用蠶繭包縛牢固數日即如故破傷風白麵燒鹽各一撮新水調塗又破傷風腫者杏仁杵膏厚塗上燃燭遙炙之火燒瘡貫衆煅灰油調塗立刻止痛滾油潑傷陳面和敷之又蟹殼灰麻油調搽又生寒水石研細末油調塗又扁柏葉冷濃茶搗敷爆竹炸傷鮮柏枝搗爛香油調敷湯泡火傷大麥炒黑研末油調搽之又油調芙蓉末敷之又生蘿蔔搗塗之子為末敷之亦可又辰砂末雞子清調敷又舊葫蘆瓢燒灰敷之又以竹中蛀蟲末塗之又醋淋洗又地榆末麻油調塗又新熱牛糞塗之又柳皮燒灰如粉敷之人咬傷鱉頭焙存性研末香油調塗又用童便淘米水亦可洗淨汙血雖痛至不省人事亦須忍住洗淨以人糞敷之或用人中黃煎湯時洗又白蘿蔔葉嚼敷又溏雞屎塗虎咬傷土蠶搗敷又雄黃硫黃紫石英各等分研末塗又嫩松毛捶融如泥將傷口內塞滿極效馬咬益母草切醋炒研塗瘋狗咬半夏末擦又紫蘇葉嚼敷又婦人尿澆又白果仁嚼塗又荔枝肉貼又搗栗子塗狗咬甜杏仁去皮尖嚼爛敷之又鵝屎敷之不爛痛貓咬薄荷煎水洗之或用川椒煎水洗之鼠咬陳火腿燒灰香油和敷又貓屎揉敷蝮蛇螫人薑末敷之干即易蛇咬生杵芹汁塗之又杵白扁豆葉敷又銅青敷又梳垢一團尿和敷又人糞封蠍螫芝麻油塗又木碗蓋於痛處過半日即愈蛇及諸毒螫煙筒中垢塗之蜈蚣咬嚼香附塗之又胡椒嚼封之即不痛蜂螫人乳塗又野莧擦又芋頭梗搗融敷蜘蛛咬炮薑切片貼之又熱甜酒洗之射工溪毒傷芥菜子末和酒厚敷半日止痛又切蒜片貼之螻蛄咬醋和石灰塗百蟲咬燈火熏又香油浸紫蘇塗烏龍刺傷又名火芭蕉烏龍刺入泥中人若足上籤踏較蛇咬更毒腫至肚腹則無藥可救急用蛔蟲無則用糞蛆數條搗爛敷患處腫消刺出而愈
