body:
  text: 跋外治壽世方初編四卷豫友鄒君儷笙所手輯而囑豫校勘者也外治之法惟針灸最古然非熟讀靈樞深明經絡者不能用以施治故世之醫者動以法仲景為言而實未窺仲景之堂奧不過廢棄針灸僅知以湯液治病而已第老人小兒不喜服藥者多一則精血耗竭一則臟腑嬌嫩要皆不堪攻伐産婦癆人用藥更難古方所以有尉浴熏蒸諸法以補其術之窮唐宋諸公在在講求且有湯藥不能盡病之說則除針灸以外非用尉浴熏蒸之法將何以收其功效是編之成固宜於窮鄉僻壤醫家鮮少之區亦豈不為杏林切要之書哉光緒三年丁丑天中節新安胡增彬謙伯氏跋
