body:
  text: 卷二身身體麻木芥子末醋調塗之遍身搔癢蒼耳子約半斤煎水洗之效又茵陳煮濃汁洗之風燥身癢威靈仙零陵香茅香各半斤乾荷葉藁本藿香白芷甘松各四兩上銼細每用四兩水一桶半熬數沸於房內沐浴遍身生泡桃枝連葉煎湯頻洗身上無故生蛆蛇蛻研末麻油調擦蛆出自愈體臭竹葉十兩桃白皮四兩水一石二斗煮取五斗浴即香皮里作痛不問何處用何首烏末薑汁調成膏塗上以帛裹住火炙鞋底尉之皮膚血濺以煮酒罈上紙數張扯碎如楊花攤在出血處按之即止勿扯去治筋疙瘩五倍子一兩密陀僧一錢共研末水調塗膏藥貼之日久自消飛絲纏住耳鼻手足等處腫痛不已威靈仙煎濃湯洗即愈頭偏正頭風此症發時雖盛暑亦覺畏風痛不可忍用蕎麥粉炒熱加醋再炒乘熱敷上用布包緊勿令見風冷則隨換日夜不斷自愈愈後鼻流黃水數日從此斷根此治頭風第一驗方並治尋常傷風頭痛惟氣虛及風火蟲痛不效又陳年黑魚頭煎湯熏數次斷根又斑蝥一個去頭足翅隔紙研細為末篩去衣殼將末少許點膏藥上如患左痛貼右太陽右痛貼左隔足半日取下永不再發久貼恐起泡又硫黃一錢川椒取紅色者去子為末三分二味拌勻熔成小餅左疼塞左鼻清涕從右鼻出右疼塞右鼻正疼左右俱塞清涕流盡即愈又真蘄艾揉融為丸時時向鼻嗅之以黃水出盡為度又鳳尾草搗融加麝香一分拌勻敷囟門上甚效又天時陰雨即發用桂心末一兩酒調塗額上頂上又決明子三錢研末水調貼太陽穴甚妙又木槿子燒煙燻患處又藁本細辛各五分白芷一錢辛夷八分共研細末用紙條四條卷實將火點著以煙燻鼻日熏二次即效又穀精草一兩為末白麵糊調攤紙上貼痛處干易又穀精草末銅緑各一錢硝石五釐隨左右搐鼻又川芎五錢晚蠶砂二兩殭蠶如患者年歲之數水五碗就砂鍋中以厚紙糊滿中開錢大一孔取藥氣熏蒸痛處每日一次雖年久者三五次永不再發又生牛蒡子梗葉無梗葉用根取自然汁兩碗陳酒一碗食鹽八分共熬成膏塗之須極力搽熱乃效凡頭風抽掣作痛者用此必愈偏頭痛鮮蘿蔔搗爛絞自然汁加冰片少許調勻昂頭灌入鼻孔左疼灌左右疼灌右少時即愈又蘄艾一團如胡桃大生半夏少許研極細末剪棉料紙一方將艾鋪紙上半夏末放艾上連紙藥共卷如小指粗塞鼻孔內左痛塞右右痛塞左隔一宿俟鼻內流出清涕為度倘一次不愈再塞一次則無不除根矣又生薑三片將桑皮紙包好水濕入灰火中煨熟乘熱將印堂兩太陽各貼一片以帶纏之立愈並治太陽風寒頭痛又白芷細辛石膏乳香去油沒藥去油各等分為末吹入鼻中左痛吹右右痛吹左頭痛遠志末搐鼻又大鮮紅蘿蔔皮貼太陽穴又吳茱萸煎濃湯以綿染頻拭髮根又蕎麥粉冷水調敷痛去立愈又柚葉同蔥白搗爛貼太陽穴又年久者用蘿蔔子生薑各四錢搗取汁入麝香末四釐灌入鼻中立止頭風沐方葶藶子煮沐不過三四度愈又川椒二升以水煮取汁沐發良又川芎羌活各一兩薄荷甘草各二兩殭蠶每歲一條上藥水煎每日中早晚各洗一次以三日為止忌見風頭痛覺熱白蕃薯切片隨痛處貼之干即易頭風畏冷桑木燒灰淋汁乘熱熏洗效虛火頭痛用南棗切片貼兩太陽穴效風痰頭疼苦瓠膜取汁以葦筒灌入鼻中其氣上達腦門須臾惡涎流下其病立愈乾者浸汁亦效其子為末吹入亦效年久頭風皆愈濕氣頭痛甜瓜蒂末搐入鼻中口含冷水取出黃水愈濕熱頭痛黑牽牛七粒砂仁一粒研末井華水調汁仰灌鼻中待涎出即愈風氣頭痛甚者乳香萆麻仁各等分搗餅隨左右貼太陽穴解發出氣甚效頭風風眼蕎麥作錢大餅貼眼四角以米大艾炷灸之即見愈頭皮虛腫薄如蒸餅狀如裹水口嚼白麵敷之良頭皮腫痛好雞蛋黃白調勻塗腫處即愈又杏仁搗膏和雞子黃杵塗帛上厚裹之干則又塗七八次愈又杏仁杵為膏塗之頭面發腫豬頭風野苧根數兩搗爛敷之即愈琉璃頭癤舊鞋底燒灰菜油調搽神效頭上軟癤野芋頭磨醋敷或用大芋搗敷亦效又雞肫皮明礬為末麻油調塗頭瘡不愈菖蒲末油調敷日夜各二次頭上薄皮瘡馬齒莧熬水每日洗二三次即愈頭瘡生蛆以刀刺瘡破擠絲瓜葉汁搽之蛆自出頭上瘡不幹用鞋底泥擦上即效頭面癬瘡生白果中切斷頻擦取效小兒頭瘡桃梟燒研入膩粉麻油調搽又杏仁燒灰敷之又麻子五升研細末絞汁和蜜敷之又糯米飯燒灰入輕粉清油調敷又舊油頭繩燒灰油調塗立愈又烏梅燒存性研末生油調塗禿瘡一名臘梨又名癩頭麻子二升熬焦末以豬脂和塗之發生為度又初起者用紫甘蔗皮煅存性香油調搽又東行棗根長三尺以中央安甑中心蒸之以器盛兩邊汁敷頭即生髮又取爛熟黑椹三升於瓷瓶中三七日化為水以塗洗之發生妙又蝸牛數十條洗之二次全愈神妙白禿瘡白麵豆豉和研敷又紫草煎汁塗之又雄黃末豬膽汁調敷即愈小兒禿瘡冷泔水洗淨以羊角蔥搗泥入蜜和塗之神效又陳火腿骨燒灰如癢加礬少許麻油調敷不生髮用老薑擦又楸葉搗汁塗又蕪菁葉燒灰和脂塗小兒白禿瘡美首膏百草霜雄黃各一兩膽礬六錢輕粉一錢榆皮三錢用石灰窯內燒紅流結土渣四兩共為細末豬膽調剃頭後塗之神效頭風白屑桑灰汁沐之良又楮木作枕六十日一易新者又藜蘆末煎湯洗頭半乾時再用藜蘆末摻上令入皮內用布扎緊數日即愈又王不留行白芷各三錢研末乾摻一夜梳去即愈腦漏一名鼻淵白鵓鴿翎毛三錢擦生漆絲綿一塊如無絲綿即揩漆布亦可須問漆匠鋪買用將二味於瓦上焙脆存性共研細末入冰片少許令病人仰臥用筆管吹入鼻內不過三四次即愈又大蒜切片貼足心取效止又真松花粉時時搐入鼻中又荔枝燒灰存性綿裹塞鼻內立效又燒酒半壺煎極滾鼻吸熱氣入腦內數次即效又玉蘭花蕊塞鼻即愈腦破骨折蜜和蔥白搗勻厚封立效發沐發方取生柏葉細銼一斗煮取湯沐發妙又桑根白皮切一升淹漬煮五六沸去滓沐發數數為之不復落又桑根白皮柏葉各一斤宣木瓜半斤泡油搽頭即潤男子煎水洗數次亦黑潤也發不生側柏葉陰乾作末和麻油塗又生胡麻油塗之又用米泔水洗淨以柴灶內百草霜五錢水粉二錢研勻生麻油調搽又婦人禿鬢髮稀用川椒四兩酒浸密室中日日塗之自然長出發短而少桑葉麻葉一方作麻油用米泔水煮汁洗之洗至七次可長數寸發易脫落棐子三個胡桃兩個側柏葉一兩搗浸雪水梳髮永不落且潤又覆盆子榨汁日塗之頭腦內癢漸至發落蘆薈苦楝子各一錢為末吹入鼻內數次自愈發黃而赤生柏葉一斤研末豬油和為丸如彈子大每日用一丸米泔水放開洗之一月後色黑而潤令髮長黑蔓荊子熊脂等分調塗之又生麻油桑葉煎過去滓沐之白髮還黑生麻油浸烏梅塗之良又用鹽湯洗沐以生麻油和蒲葦灰敷之染髮令黑醋煮黑豆去渣煎稠染之蒜髮蔓荊子油日日塗之咬髮癬黃連黃柏各五分飛丹枯礬各一錢松香二錢煙膏四錢研末以紫草黃連浸油調搽發中生癤如珠相染不已此名火珠遲則難治急用生蘿蔔搗爛好醋泡透敷之鬈毛瘡生頭上如葡萄狀用黃柏一兩乳香二錢五分為末槐花煎水調敷鬢邊疽數年不愈者用豬貓頭上毛各一撮煅灰又雄鼠糞一粒研末以青油調搽立愈眉眉毛不生芥子半夏等分為末生薑自然汁調塗數次即生又桑葉七片日日洗之一月復生如舊發落亦然又脂麻花陰乾為末用秸灰加麻油調塗又黑脂麻花陰乾為末以黑脂麻油泡之日搽數次自生又旋覆花天麻防風各一錢共研末麻油調敷生旱蓮草搗敷數日即生並治發落不生又雄黃末一兩好醋調搽即生眉毛脫落蔓菁子四兩炒研醋和塗之眉上生瘡肥皂燒存性枯礬要燒透各等分為末麻油調搽先用白礬泡水洗淨面面上生瘡急尋有殼蝸牛一二個搗融攤紙上貼之中間留一小孔出氣初起用之神效又方鹿角燒研末豬膽調搽又生杏仁搗爛以雞子清調勻捻成煎餅至夜洗面後敷之旦即洗去連敷數夜自愈面上生五色瘡溫鹽湯綿浸拓瘡上每日五六度二三日自瘥肺熱面瘡苦絲瓜牙皂莢等分燒灰油調搽面腫杏仁杵為膏搽之自消面上粉刺又名酒刺由肺經血熱而生輕粉黃芩白芷白附子防風各一錢為末蜜丸每日洗面時多擦數次臨睡復洗面擦之三日消痕滅跡又白礬酒調敷又白蘞白石脂杏仁各等分搗末以雞子白和勻用井花水洗淨敷之三五次即效面上風刺黑牽牛酒浸三宿為末先以薑汁擦面後用藥塗之面上雀斑白茯苓末夜夜敷之二七日愈又紫背浮萍漢防己煎水洗或曬乾為末搽之甚效又蒼耳草嫩葉尖和鹽少許搗爛五六月間日擦十餘次效又鷹屎白水調敷之又附子蛤粉茯苓白芷陀僧山奈各五錢共為末蜜調擦面上次日洗去甚效並治酒刺面皯李子仁和雞子清塗上則落又皂角子杏仁各等分研勻夜以津和塗之又橙核濕研夜夜塗之又白附子末以水和塗頻頻用即落盡雀卵面皰桃花冬瓜仁等分研末蜜調敷面上黶子七月七日午時取瓜葉七十一片直入北堂中面南立逐片拭黶即滅面上黑子鵝不食草煎湯日洗之面上黑氣半夏焙研米醋調敷不可見風不計遍數從早至晚時時敷之如此三日皂角湯洗之面瑩如玉面黑令白天門冬曬乾和蜜搗作丸日用洗面又栝蔞瓤三兩杏仁一兩豬胰一具同研如膏夜夜塗之令面光潤冬月不皴面黑皮厚羊脛骨末雞子清調每夜敷早以米泔水洗去十日後面白皮嫩神效面生皺紋大母豬蹄四個洗淨煮成膏臥時搽面上次早洗去半月後即不皺矣冬天面唇皺破熟豬油夜夜敷之面上瘢痕蒺藜子山梔子各一合為末醋和勻夜塗旦洗洗面光彩輕粉滑石水飛淨杏仁去皮取霜各等分為末蒸過加冰片少許一方並加麝香少許用雞子清去黃調勻洗面敷之一月後色如紅玉名紅玉膏又頂上金色密陀僧一兩研細末用人乳或蜜調如薄漿糊每夜略蒸待熱敷面次早洗去半月後面光如鏡又冬桑葉煎濃汁收藏冬月早晨用一酒杯攙入水內洗面光滑如鏡面亦不凍兩腮赤腫又名痄腮醋調陳石灰敷又絲瓜燒存性研末水調塗又皂角二兩生南星二錢糯米一合共為末薑汁調敷立效又大黃白芨五倍子共為末雞子清調搽輕者用靛花或磨鹿角搽重則用此被酒僕石面額俱傷血流不止水磨橄欖汁塗之信宿而愈目明目枕蕎麥皮緑豆皮黑豆皮決明子菊花同作枕至老目明洗眼方每年九月草三日用桑葉煎水洗目一次至老永不昏暗且夜能看細書其妙無窮桑葉須五月五日六月六日立冬日採者為佳同黑脂麻等分蜜丸名為扶桑丸能除風濕烏須明目一切眼疾箬葉即𦼔葉燒灰用布淋汁洗之洗久自效又韭菜根洗淨用橘葉外裹男左女右塞鼻中過夜即愈屢效又青萍少許研爛入頂上梅花冰片少許貼眼皮上過夜漸散治胬肉攀睛神效又冬天取淨臘雪將大荸薺同雪水磨粉曬乾加冰片少許入鵝毛管中點眼神效治赤眼黃丹白蜜調貼太陽穴止痛立效又以鹽湯洗之又用人乳浸黃連蒸過頻點神效又燒荊木出黃汁敷之又芙蓉末水和貼太陽穴又薑汁調飛礬塗眼皮上痛即止又雄狗尿乘熱搽如神又五更頭用自家熱小便蘸洗又澀痛者用三七磨水塗眼眶胞效又桑葉為末紙卷燒煙熏鼻取效又荸薺汁塗上即效又日久不愈者用蕤仁選白淨者去殼研細去淨油不淨不效調白蜜用骨簪點眼內角即能退紅止痛效驗之至風火眼童便煎甘菊湯頻頻洗之又久害不愈尚未生翳用生薑汁一