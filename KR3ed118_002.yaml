五錢馬齒莧一兩為末敷之耳外濕瘡大雞腰子一對蒸熟去皮枯礬三分共搗融加頂上冰片一二分敷之並治小兒胎毒及頭面耳前後一切濕瘡兼羊鬚瘡又黃丹一錢松香八分輕粉枯礬各一分共為細末香油調擦效耳下生瘡用鉛粉摻之耳後鋭毒大天南星煅存性醋調塗三次即愈耳被挖傷金頭蜈蚣一條瓦上焙存性研末吹入立效又青魚膽一個紅花一錢元參生地各二錢蒸出濃汁灌入耳中即愈兩耳凍瘡生薑自然汁熬膏塗又橄欖燒研細末油調塗之並治足上凍瘡兩耳脫落用人發入瓦罐以鹽泥封固煅過為末急以所傷耳蘸藥安於舊處再用老薑嚼融四圍厚敷用綢捆定自安並治鼻落治法同耳中有物不出用弓弦或麻繩將一頭搓散用好魚鰾黏著放耳內其物徐徐引出百蟲入耳薑汁少許滴之又人乳滴之又韭汁灌之又膽礬和醋灌之又車缸脂塗孔上自出又貓尿滴之生薑擦貓鼻即有尿又桃葉作枕枕之蟲自鼻出或火尉桃葉卷之取塞耳立出蛆蟲入耳杏仁搗如泥取油滴之又皂礬摻之即化為水壁虎入耳雞冠血滴入即出蜈蚣入耳炒肉放耳邊聞香自出烹雞更妙或用生薑汁或韭菜汁灌入即出螞蝗入耳取田中泥放耳邊自出蜓蝣入耳生半夏末麻油調塗耳門蟲聞香即出又蒜洗淨搗汁滴之未出再滴又羊乳滴之化水流出又白洋糖熟水調濃汁滴入亦化為水飛蛾入耳用銅器向耳邊敲打自出螞蟻入耳穿山甲燒研為末調水灌入又用手將耳扯動即出蚤蝨入耳菖蒲末炒熱盛袋枕之其蝨自然而出壁蝨入耳用稻稈灰汁灌水銀入耳枕金器自出水入耳中薄荷汁滴入立效鼻鼻血用線扎緊手中指第二骨節灣屈之處即止左流扎右右流扎左雙流雙扎極效又井底泥和苔蘚貼囟上立止又石榴花瓣塞之或以蘿蔔汁藕汁滴入鼻內或火煅龍骨吹入俱可又薄荷葉塞之又大蒜一枚去皮研如泥作錢大餅子厚一豆許左鼻出血貼左足心右貼右足心兩鼻俱出俱貼立效又蓮蓬殼煅存性吹鼻又梔子燒存性研末吹之又槐花末吹之又猝然以水噀其面即止又左衄以綿塞右耳右衄塞左耳神應又青蒿納鼻中即止又井水磨陳京墨燈草蘸塞之又多年溺壺於火上烘熱向鼻熏之立止又生吳萸研末津調塗足底湧泉穴用山梔炒黑研末吹鼻中效又青菜葉塞鼻即愈又紙條濃蘸真麻油入鼻取嚏效鼻中息鵝不食草搗爛塞之自落又藕節有毛處一節燒存性為末吹患處效又甜瓜蒂末七月七日收者更妙白礬末各五分綿裹塞之或以豬脂和挺子塞之一日一換又白礬一錢磠砂五分共為末以三四分吹之其息肉即化鼻中塞肉不通利細辛瓜蒂各等分研末吹鼻中須臾涕出頻吹即愈又陳瓜蒂搗末敷塞肉上取瘥鼻塞不通麻鞋燒灰吹之即通又通草細辛附子共為末蜜調綿裹納鼻中又菖蒲皂角去蟲蛀者共為末每用一錢綿裹塞鼻仰臥少時效皂角末單用吹之亦通鼻窒痛杏仁白芷細辛各一錢全蠍兩個焙末麻油調敷鼻痔霜梅一個萆麻仁七粒生礬少許同搗勻綿裹塞鼻內一日夜即愈又輕粉二錢杏仁七粒去油白礬五錢共為末吹入痔即化水又甜瓜蒂四錢甘遂一錢枯礬螺殼灰草烏灰各五分為末麻油調作丸如鼻孔大每日塞入一次其痔化水肉皆爛下而愈又頂上梅花冰片點之雖痔肉垂下亦入或用生藕節連須瓦上焙枯研末和頂上冰片水調敷齆鼻將鐵磨石上取末豬油調綿裹塞鼻肉出愈又幹姜為末吹鼻中或蜜調塞鼻疳蟲蝕鼻生瘡綿裹人屎灰夜臥著之又燒牛狗骨灰末以臘月豬脂和敷之瘥又燒故馬絆末敷之又取烏牛耳垢敷又取牛鼻頭津敷之良鼻內生瘡黃柏檳榔共為末豬油調敷又嫩桃葉捶爛塞之無葉用枝亦可又紫荊花陰乾為末貼之又元參研末吹入或以水將元參泡軟塞之又陀僧白芷各二錢共研末蠟燭油調搽甚效又杏仁油和鹽塗之鼻流清涕不止蓽茇末吹之有效又生花生四五斤入鍋內合患者親手拌炒炒之數次即愈老人鼻流清涕大蒜搗貼足心口鼻生疳蝕爛青靛搽患處每日十次每夜五次三四日愈鼻皶赤泡密陀僧二兩細研每夜用一錢人乳調塗早洗去風刺赤鼻大風子仁木鱉子仁輕粉硫黃為末夜夜津調塗之酒皶赤外桐油入黃丹雄黃敷之又食鹽研細每早擦牙噙水瀨口吐入手中洗面月餘自愈又白果嚼融和甜酒糟夜敷日洗甚效又馬蘭子花搗封之佳又蕎麥麵燒灰研細麻油塗之又鸕鷀矢末以臘月豬脂和塗之各項鼻病凡鼻淵鼻痔鼻中肉塊鼻塞鼻瘡等症用辛夷花苞又名木筆花去赤肉毛子以芭蕉煎水泡一夜焙乾為末加麝香三釐蔥白蘸入鼻孔數次極效鼻中生毛晝夜可長一二尺漸粗如繩痛不可忍此食豬牛羊血過多所致用豬毛焙存性研末吹入鼻中即愈如食牛羊血過多者或加牛羊毛亦可鼻垂紅線尺許痛甚欲死真硼砂頂上牙色梅花冰片各一錢為末以人乳調之輕輕點在紅線中間頃刻即消諸物入鼻脹痛不出牛油如棗核大納鼻中油溶則物潤而隨出矣唇唇中腫大生蒲黃二錢川連頂上梅花冰片各一錢共為細末麻油調敷唇腫破爛流水黃連二兩銅緑五錢枯礬一錢五分宮粉三錢熬膏臨用加冰片五釐麝香一釐敷口唇腫黑痛癢不可忍大銅錢四個於石上磨豬油時時擦之照疔瘡法治亦可唇瘡以頭垢敷之日三又東壁土敷之又胡粉敷之又白梅瓣貼之開裂出血者即止又飯甑上滴下汗擦數次效又白荷花瓣貼之亦妙嘴唇四圍瘡如黃蠟旋覆花瓦上煅存性研末真麻油調塗又葵花根瓦上焙存性研末麻油調搽更效唇破生瘡瓦松生薑汁搗融入鹽少許敷之唇燥生瘡青皮燒研豬脂調塗嘴唇翻轉形如豬嘴名唇菌此心脾熱毒所致對時必死無藥可救急燒兩手少商穴在兩手大指內外甲縫之中不上不下即是一面用蚯蚓十條搗爛吳茱萸二錢研末加灰面少許熱醋調敷兩腳心用布捆住半日一換以愈為度或用溏雞糞敷唇乾裂痛桃仁搗爛和豬油調塗即愈唇燥餂舌松毛煮老豆腐貼之日換數次良又橄欖磨汁塗之或以橄欖炒研豬脂和塗之繭唇口不能開合風熱蘊於脾經也青皮燒灰黃柏各等分為末豬脂調塗效又用新白布作卷如酒杯大燒燃放刀口上俟刀口汗出取汁塗之日搽十餘次效並以青布燒灰沖酒服又五倍子訶子肉等分為末香油調敷神效緊唇炙松脂貼上又以蠟片炙貼之一宿瘥又取膝頭垢綿裹燒敷之又燒人屎灰敷之缺唇蟹燒灰二錢乳香沒藥去油各二分半熟水和塗即生肉口與唇部參看口臭難聞每早洗面時用白牽牛粉擦牙瀨口日久自無此病又密陀僧一錢醋調瀨口又真藿香常噙口中即解口瘡陳白螺螄殼燒存性加兒茶少許為末吹敷即愈又生黃柏蜜炒為末敷之又蘿蔔自然汁頻瀨去涎又草烏南星各一個生薑一塊為末臨臥時貼兩手足心便愈又縮砂殼煅研塗之又茄蒂燒灰敷之又白楊嫩枝鐵上燒灰和脂敷之天行口瘡橄欖核仁研敷之又五倍子末搽之吐涎則愈口吻生瘡世謂之肥瘡一名燕口瘡楸白皮及濕貼之數易取瘥又掘經年葵根欲腐者彌佳燒灰敷之口舌爛瘡蚯蚓吳茱萸同研末醋調塗足心又川黃連北細辛各二分生研極細末以小管吹入瘡上神效此方熱因寒用寒因熱用功成而無偏勝大人小兒並治切忌入喉口內上齶生癰亦名懸癰生口上齶形如紫葡萄舌難伸縮口難開合鼻內出血時作寒熱急用食鹽燒紅枯礬各等分研細末以筷頭蘸點日三五次自消通治口舌生瘡及風火牙疼上熱足涼者白礬三兩熱湯化之以足浸半日即效舌舌脹滿口醋調鍋底煙子敷舌上下多敷更效又萆麻子四十粒紙上取油將油紙燒煙燻舌即消若舌上出血熏鼻中自止木舌腫強用糖醋時時噙嗽又殭蠶一錢黃連蜜炒二錢為末搽之痰出為妙或單用殭蠶為末吹之舌腫柴灶內百草霜和酒塗舌下即愈又朴硝白礬為末擦或用朴硝緑礬煅敷小兒舌腫以食鹽百草霜為末井水調敷舌忽腫出口外或長數寸此亦心火熱極所致用雄雞冠血一小盞以舌浸之即縮或照舌腫各方治之又真川連三四錢煎濃汁以舌浸之亦效舌下腫痛蒲黃五錢煎濃汁去渣含口中數次極效又腫痛欲死者皂礬二錢瓦上焙紅研末醋調敷喉風舌大如脬不急救即死用冰片一分火硝三分青黛二分殭蠶五分膽礬二分硼砂三分共為末吹之即愈舌胎語謇薄荷自然汁和白蜜薑汁搽之重舌陳醋一碗五靈脂一兩入銅杓內煎三沸為度沸即離火用箸攪之沫平再煎候冷將醋少許頻含待涎沫滿口即吐勿咽下又牙皂角四五挺須不蛀者去皮核炙焦荊芥穗二錢共為細末以米醋調塗腫處即消舌硬生衣犀黃硃砂各一分元精石二兩共研細末將舌尖刺出紫血用此藥搽之即愈舌出不收用辰砂敷之或暗擲盆碗作墜地聲驚之即收傷寒熱病後舌出寸余不收頂上梅花冰片研細摻舌上應手而縮須用五錢方效並治舌長過寸及小兒舌腫舌出口角時時搖動此名翣舌風用翠鳥舌舌須陰乾備用在兩額點戳幾下即愈舌忽縮入銀針刺破舌尖出盡惡血以蠟燭油搽之即愈又生艾搗敷舌上出血槐花炒為末摻之又頭髮燒灰醋調敷之又茅草根生車前子亂髮各為末吹擦舌梗出血木賊四錢煎水漱口即止舌爛吳茱萸三四錢研末好熱醋調敷兩足心用布捆好對時一換甚效或兼用人中白散治之見齒部並治咽舌生瘡小舌落下以食鹽炒熱點數次即上先用箸將大舌壓住然後點之又鹽橄欖並核燒存性研末吹之補斷舌法凡人遇含刀在口割斷舌頭已垂落而未斷用雞蛋內白軟皮套住舌頭另以天花粉三兩赤芍二兩薑黃白芷各一兩為末蜜調塗舌根以白蜜調白蠟稀稠得宜敷在雞蛋皮上日敷數次三日舌自接住去雞蛋皮再用蜜蠟勤敷七日全愈又如跌撲穿斷舌心血出不止以鵝翎蘸米醋頻刷斷處其血即止或用瘦豬肉片貼之更妙又活蟹一個炙乾為末敷上即能生肌藥宜預製以備急用又活蟹燒灰乳香沒藥各二錢塗之即生肉如咬去唇舌用川烏草烏為末攤紙一條以涼水調合貼之即不覺疼齒固齒方取老鼠頭骨牙同鹽煅存性研細以擦動牙牙即收上不搖又生竹葉去梗淨一斤生薑四兩淨白鹽六兩先將竹葉熬出濃汁又將姜搗汁用熬瀝渣將鹽同熬干如遇牙痛用擦一二次即愈名竹葉膏又臘月醃豬羊骨煅灰研細每晨擦牙不可間斷至老而其效益彰頭上齒骨亦佳取齒丹活鯽魚一條重十兩以白砒一錢入腹內放無風無貓犬處七日魚身發白毛用雞毛拂下以少許膏藥收之每遇病牙取些些膏貼齒片刻即落又用白馬尿浸茄根三日炒研為末點在牙根須臾其牙可落切勿近好牙又大蒜一個搗爛入白龍骨末一二分拌勻貼痛處半時即下齒牙疼痛老蒜二瓣輕粉一錢同搗融敷經渠穴在大指腳下手腕處寸脈後即是用蜆殼蓋上扎住用別物蓋亦可男左女右少頃微覺其辣即便揭去隨起一泡立時痛止泡須挑破揩盡毒水良效又上方如不知穴處即用老蒜搗爛如蠶豆大敷在大指二指手背上微窩處亦極神效又獨頭蒜煨熱切尉痛處旋易之亦主蟲痛又槐條熬濃水煮鹽炒乾擦又燒牛膝根末以綿裹著齒痛處含之又黑豆煮酒頻頻嗽之又用溺壺烘熱熏耳又石膏二兩明礬六錢俱半生半熟研細末擦之當永無齒痛如痛者擦四五次效又骨碎補二兩銅刀切細以石上生者為佳食鹽五錢桑椹子五錢瓦鍋內熬成膏去淨渣早晚擦牙良久吐之不惟可治牙痛且能固齒益髓去骨中毒氣牙動將落者擦一月後再不復動又川椒三分細辛二分此味必須稱准多則頭必牽引作痛白芷防風各一錢共用滾開水泡透時時含水入口片刻吐去再含無論風火蟲牙莫不見效不可輕視又石膏二錢胡椒三粒共研細末敷之極效又老生薑瓦焙二錢入枯礬一錢共為末塗二次即愈又烏梅燒存性研末臨用加頂上牙色冰片少許擦之又壁錢包胡椒末塞痛一邊耳手掩枕之額微汗愈又黑山梔桑葉二味泡湯乘熱嗽口不痛乃止又冰片硃砂等分共研末擦之又瑞香花含之即止又火硝雄黃元明粉共為末擦患處效又雄黃沒石子各一錢細辛五分共為末左痛用少許吹入左鼻孔再用少許吹入右耳右痛吹右鼻左耳風熱牙痛大黃瓶內燒存性研末早晨揩牙嗽口名紫金散並治一切牙痛去口氣大效又甜瓜蒂七枚炒研麝香少許和之綿裹咬定流涎風火牙痛松木節一小片咬痛上立止又杉樹皮煎濃湯嗽之又辣椒根即辣茄根煎濃湯含嗽又五倍子末冷水調敷腮頰甚效又生地搗爛加潮腦少許不可過多捶勻貼患處吐出涎水神效又莧菜根燒灰敷之又生絲瓜一條擦鹽少許火燒存性研末頻擦涎盡即愈腮腫用水調末敷之極效又北細辛北五味各二分共搗為丸塞痛處立效風蟲牙痛皂角子末綿裹彈子大兩個醋煮熱更互尉之日三五度蟲牙痛雄黃末和棗肉為丸塞牙縫日換數次極驗又蛇床子三錢煎湯一鍾乘熱嗽二次即止又川椒鹽水炒七錢枯礬三錢共為末每日擦牙甚效立止牙痛蓽茇一錢川椒石膏各五分青鹽四分共為細末點痛處即止牙齒腫痛李根白皮煎水含嗽又隔年糟茄燒灰頻頻乾擦又醬茄陳年者佳燒存性為末掩患處齒根腫松毛一把鹽一合以好酒三升煮取一升含之冷即吐瘥即止又馬齒莧嚼汁含之陰虛牙痛緩痛者是生附子研末口水調敷兩足心極效又胡桃殼四五斤打至粉碎加川椒食鹽各少許熬成濃汁攤冷時時嗽齒甚效打動牙疼蒺藜子或根為末日日揩之牙齦腫爛出臭水芥菜根燒存性研末連敷六七次效又瓦松白礬各等分水煎嗽之立效又刀豆殼燒灰加冰片擦涎出即安走馬牙疳牙根腐爛者是凡大人熱病之後及小兒痘症後火毒流於胃經致有此患勢甚危急甚則落牙穿腮透鼻一二日即能致命故有走馬之名言其驟也此症有五不治不食爛舌根者不治黑腐如筋者不治白色肉浮者為胃爛不治牙落穿腮鼻臭不堪聞者不治山根上發紅點者不治如是凶險命在須臾急用生大黃三錢丁香十粒緑豆二錢共研末熱醋調敷兩足心最為神效仍照後金鞭散治之庶幾十可救五又名金鞭散緑礬五兩煅赤透人中白三兩煅明雄二兩真麝香頂上梅花冰片各一錢先將銀針挑刮去腐肉紫血然後將藥研末敷之吐出毒血惡涎方能愈也又名赤霜散專治走馬牙疳用紅棗一枚去核入紅砒一粒如黃豆大扎好放瓦上炭火炙至棗枯煙盡為度取出用碗蓋住候冷加頂上梅花冰片一分研末將患處洗淨吹入效甚久爛之孔生肌亦速又柳花燒存性入麝香少許搽又陳年南棗核燒灰研末摻之又屋上貓屎經過霜雪雨淋日曬色已白者取下瓦上炙灰研細放在地俟冷加冰片少許研和吹之雖延及喉間者立愈又蒲黃炒擦即愈又生附子一錢生半夏二錢加蔥白共搗爛扎腳底男左女右鼻內有氣出即愈又名人中白散治男婦大小走馬牙疳並治咽喉疼痛腐爛紅赤舌腫齦臭映血牙床潰腐等症極效人中白兒茶真青黛真硼砂各一錢薄荷元明粉馬屁勃各五分頂上梅花冰片二分共研極細如灰面細放舌上無渣為度摻之如病重者加真犀黃三分珍珠五分其效更速咽喉痛用筆管吹入日三次夜二次更妙牙疳痛蜒蝣一條用細夏布包之揩在患處二次效又黃柏末青苔各一錢冰片一分研細擦牙縫出血一名牙宣又名牙衄苦參一兩枯礬一錢為末日三揩之愈又枯礬敷擦又童便溫熱含之立止又五倍子燒存性研末敷之又百草霜即鍋底下煤敷之又梧桐淚研細末納縫中即止又黃豆渣即豆腐店中取過黃豆漿之渣黃豆為佳黑豆不可用敷之立止滿口牙齒出血馬糞燒存性搽之立愈牙齒稀疏爐甘石煅研石膏各等分日日擦之不可刷動久則自密牙關緊閉鹽梅擦牙上涎出即開齒折重生雄鼠脊骨為末每日擦揩折處一月內即生又雌雄雞屎各十五顆焙研入麝香末一分先將牙根以針挑破血出敷之十日之間即可重生齒黃糯米糖燒取白灰旦旦擦之須烏須法五倍子一兩銅緑三錢炒紅用醋淬之醋不宜多再炒再淬凡三次研碎青礬二錢炒研生鹽五分炒先將五倍子研碎用銅鍋炒至出油成團放地上攤冷再將各藥研碎用好燒酒調成麵糊樣蒸至鏡面為度不宜久蒸先用皂角水洗須一次又用茶洗一次將藥乘熱濃染俟乾用熱水洗去其須光潤如漆可保兩月不白又落花生淨肉炒極焦黑研極細捻鬚一二日後色黑如漆又酸石榴結成時就東南枝上揀大者一個頂上開一孔納水銀五錢於中原皮封之麻扎定牛屎封護待經霜摘下傾出殼內水用魚鰾籠指蘸水捻鬚久久自黑拔白還黑先將白鬚抉去用豬膽塗孔中即生黑鬚或用白蠟點孔中不再白也腮頰腮車熱腫赤小豆末和蜜塗之或加芙蓉葉尤效又老絲瓜燒存性研末清水調塗頰東開不能合皂角末吹鼻嚏出即合下頦脫落真烏梅搗融為餅塞滿牙盡頭處張口流涎隨手掇上或口含烏梅一個亦效痄腮蔥煎水盡洗即消又赤小豆為末醋調敷又山梔末飛面各等分豬膽汁好醋各半薄調敷之羊鬚瘡小紅棗燒枯存性研末清油調敷又諸藥不效者以舊綿絮胎燒灰麻油調塗立愈頸項項軟五加皮為末酒調敷頂骨上干則再易濕者敷之項強黑豆蒸熟納袋中枕之又生桃葉蒸熟入袋中著頭上尉之又萆麻葉搗敷效項後結核或赤腫硬痛生山藥一挺去皮萆麻子二個同研貼之神效閃頸促腰真硼砂研粉以燈心蘸點眼四角淚出即松連點三次立愈燕窩瘡本名髮際瘡生頭枕骨下發盡處銅燈盞內青垢刮下研爛擦之神效對口瘡婦人頭上油垢三錢黑背鯽魚一個約一兩豬眼梢一對同搗爛敷之又象貝母研末敷之又雄豬眼梢肉三錢剁爛如泥加滑石末四錢和勻敷患處頂上以膏藥蓋之拔去僵肉放出黃水即愈瘰癧破琉璃燒灰菜油調搽神效又萆麻肉嫩松香等分千錘攤貼又蜈蚣一條瓦焙研末油調敷又用鉛三兩鐵器中熬久當有腳如黑灰取此灰和脂塗癧上或用醋調塗以舊帛貼之數換舊帛拭去惡汁又貼如此半月許不痛不破不作瘡內消為水而愈並治痰核咽喉紫袍散治十八種喉風青黛水飛石青雄黃各一兩膽礬三錢人中白硼砂元明粉各五錢黃連二錢真冰片五分共為細末瓷瓶收藏勿泄氣急時以二三分吹喉愈單雙喉蛾又名喉痹生於咽喉關上者輕關下者重此症喉閉片時即不可救若男子從鼻梁中心尋至頂門婦人則從後腦尋至頂上小兒則看兩手虎口如有水泡紅子即用銀針挑穿喉蛾即破忌見燈火一面用老蒜搗融如蠶豆大敷經渠穴在大指下手腕處寸脈後即是男左女右用蜆殼蓋上扎住用別物蓋亦可片時起一水泡銀針挑破將水揩淨以去毒氣立刻安痊再服甘桔湯金銀花二錢甘草一錢桔梗八分牛蒡子錢半水煎服以免後患無藥之處不服亦可此方屢試神效又手指甲燒灰吹入其蛾立破或用燈草燒灰吹入亦驗又治走馬喉痹喉蛾氣絶者用巴豆一粒去皮麝香一分同研勻以綿裹隨所患左右塞鼻中如左右俱有用二枚左右俱塞喉閉乳蛾雞肫皮勿洗乾燒為末用竹管吹之立愈又燕子窠泥雄黃等分共研為末以堆花燒酒調敷咽喉外兩旁即愈又喉間方覺脹滿起泡者急以食鹽用搓手掌心鹽干後易新鹽搓之數刻即消又馬蘭汁嗽之即愈又土牛膝根生掘洗淨忌鐵與油須用指甲摘斷入瓷碗中滴入人乳和拌用木槌搗爛然後將碗坐熱水中熬出藥汁以茶匙挑藥汁灌入鼻中男左女右片時腫消疾愈神效喉痹礬石一兩水三升漬洗手足又腫痛者用芥子末水和敷喉下干即易之又腫塞不通者用箬葉燈草等分燒灰退火性吹之喉腫難食韭一把搗熬敷之冷則易又薤根醋搗敷腫處冷即易又苦酒和黃柏末敷之冷即易又白麵和醋塗喉外腫處咽喉卒塞無藥處以皂角末吹鼻取嚏用李樹近根皮磨水塗喉外良纏喉風嘬口急用牽牛鼻繩將穿鼻一段燒存性吹之甚效又牙皂一兩去皮弦研末醋調敷外頸上干即易極效並治乳蛾又芒硝一兩白殭蠶五錢甘草二錢五分青黛一錢共研細末每取二三分吹之效又蟢子窠十餘個牆上者佳瓦上焙取灰加冰片少許吹喉神效一方止用蟢子窠無冰片又殭蠶炒去絲嘴白礬各二錢共研細末加冰片少許吹喉急喉風巴豆一粒不拘何物包好塞鼻孔男左女右又巴豆七粒細辛八分共研末用綿裹隨患左右塞鼻孔雙蛾左右換塞腫消去之又年久尿壺垢瓦上炙研細吹入立愈喉症開關方牙皂巴豆共為末米湯調刷紙上曬乾作捻子點火以煙燻鼻孔立能開口鼻流涕涎專治十八種喉閉又頭髮指甲各煅存性紅紙捲筒吹患處男右用女左指發男左用女右指發女左用男右指發女右用男左指發喉中結塊不通水食危急欲死膽礬銜口內惡涎吐儘自愈喉卒攻痛商陸根切炙熱隔布尉之冷即易又搗艾敷之忽然口不能言附子研末吹入喉中即愈喉內生瘡鼻孔亦爛若作喉風治立死用白鹽梅一個燒存性枯礬一錢穿山甲炙一錢共為末吹喉中神效或用人中白散見齒部治之喉癬刀豆殼燒灰以二三釐吹之立效風火喉癬秋蝴蝶花根二兩即射干秋間開黃花者是洗淨搗爛甜酒煎汁含口中嗽三五次吐出再換再嗽可以除根煙筒傷喉出血不止桂圓核去外面黑皮惟取內核仁焙搗為極細末看喉中傷處用筆管安末吹之即定疼止血而愈屢效並治刀傷出血魚骨哽喉午日午時韭地上面東不語取蚯蚓糞泥藏之圓如碎珠粒粒成塊為妙遇魚骨哽喉用少許擦咽喉外皮即消
