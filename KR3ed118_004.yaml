body:
  text: 卷四婦科通經益母草煎洗小腹又鬼螺螄十四個生在陰處者是砑碎油紙攤貼臍上縛定周時又經閉用蠶砂酒炒尉又經閉按腹內似有痞塊者鱔魚血隨患處大小塗一圈另用皮硝黃丹百草霜各研末五錢紅皮獨蒜一枚同搗敷圈內覺口中有蒜味即擦去經前腹痛紫蘇陰乾四兩候經期如肚腹脹痛煎湯熏洗下部摩運小腹每經摩洗三四日則經正痛止婦人因開甑為熱氣所沖面目腫大經水不通舊蒸飯布越舊越好燒灰用鍋蓋上氣水甑蓋上氣水亦可調敷隨敷隨消經水亦通無蒸飯布蒸底燒灰亦可婦人氣滯木香生地黃搗餅貼患處尉斗尉之並治腫核血崩不止枯礬黃丹各五錢研綿絹包裹麻油抹絹面線扎一團用線穿竹筒上仰臥入陰戶內將竹筒退出一炷香久即止止後將線掣出藥團又燒漆器令聞又舊氈條或綿花胎坐身下又黑驢糞燒熏之又危急者以黃丹鉛粉絹包塞入陰戶以線帶住止即去之治帶下以灶下黃土水和為泥作彈子丸百枚曬乾以火燒熱徹用三年酢漬一丸綿裹納陰戶中唯深待冷即易之新患者三十丸瘥久者五十丸白帶雞冠花醋炙紅花酒炒荷葉灰白朮茯苓陳壁土車前子各一錢為末酒或米湯調敷臍上可利濕熱又熱鹽炒艾尉臍五色帶下年久古磚一塊燒極紅赤以油煎麵餅七個安放磚上再用黃瓜根研末鋪面餅上加布兩層令病人坐上使藥氣熏入腹中當有蟲出治三五次蟲盡即愈以上調經崩帶陰冷母丁香為末紗裹如指大納入又蛇床子炒研二錢白粉一錢調勻如棗大每用一枚綿裹納入陰內自然溫暖子宮寒冷不能受孕吳茱萸川椒各八兩共為末煉蜜為丸如彈子大綿裹納入陰戶中日夜一換一月後子宮和暖即可成孕又硫黃煎水常洗效婦人無子坐導藥方皂莢一兩炙去皮子大黃戎鹽礬石燒當歸各二兩五味子乾薑細辛各三兩蜀椒汗二兩葶藶子千金方無此味苦瓠各三分千金方作山茱萸上十一味搗篩納輕絹袋子如中指許大長三寸盛之令滿納子門中坐臥任意勿行走急小便時即出之仍易新者一日當下青黃冷汁汁盡止即可幸御自有子若未見病出亦可至十日安之一方有砒霜三分又蛇床子芫花各三兩搗篩取棗大紗袋盛納産門中令沒指袋少長便時須去任意臥著慎風冷四奇種子丸粉龍骨五色者佳瓦上煅鎖陽醋洗北細辛水泡一夜曬乾陽起石見太陽飛動者佳各三錢早黃桂花人乳拌曬旱地浮萍要肥大者吳茱萸醋泡過一夜炒上肉桂去皮各二錢紫梢花色潤紫者佳石榴皮瓦上焙乾砂仁去殼燒酒洗焙乾肉蓯蓉紅色者佳焙乾川椒要開口者枸杞去核炒麝香用當門子白芷銅器內炒黃鬧楊花焙象皮末真鴉片各一錢高麗參蘆五錢萆麻子四十九粒去殼去油淨共為末煉蜜為丸如小圓眼肉大丁香油為衣每於經淨七日之內先放一丸入陰戶內待一頓飯時藥化然後行事然種子務宜節欲若藉此淫佚無度竊恐子未種而身先喪觀者慎諸丁公仙枕方用槐木薄板做枕一個高三寸三分寬四寸五分長一尺二寸如天蓋地二面上鑽孔一百二十八個如桐子大用後藥裝入枕中百日後諸病消除精神倍長壽高多子真仙方也如夫婦皆以此作枕更見功效其藥料三五過月一換真川椒桔梗荊實子柏子仁薑黃吳茱萸白朮薄荷肉桂川芎益智仁枳實全當歸川烏千年健五加皮藜蘆羌活防風辛夷白芷附子白芍藁本蓯蓉白細辛豬牙皂蕪夷甘草荊芥菊花杜仲烏藥半夏共三十四味每味一兩務選頂好鮮明咀片研為細末絹袋盛之裝入枕中以上種子轉女為男法婦人覺有娠即以雄黃一兩裝絳紗囊佩小腹妊娠心痛蜜一升和井底泥塗心下又取弩弦急帶之立愈妊娠傷寒熱病保胎法用井底泥入灶心土敷於臍下或加青黛如干再塗又白藥子不拘多少為末以雞子清調攤於紙上如碗大貼臍下胎存處干則以濕水潤之妊娠風寒交中不省人事狀如中風用熟艾三兩米醋炒極熱以絹包尉臍良久即愈妊娠目鼻咽喉唇口諸病孕婦專以清熱為主目鼻諸病多屬熱用吳茱萸五錢研末好溫醋調敷兩足心用布包好過一日夜足心如覺發熱即愈如尚未愈連換數次再敷一日夜則無不愈矣並治胎上衝心安即洗去妊娠遍身搔癢此症有風不可服藥用樟腦調酒擦之即愈妊娠腹癢取鐵箭頭用舊針線袋亦可安臥席下勿令婦知子鳴子在腹中鳴者謂之子鳴此由孕婦或欠身向高處取物子在腹中失脫口中所含疙瘩故啼治法或令孕婦作男子拜狀或以豆撒地令其檢拾子復含著則止妊娠小便不通蔥白二十根細切和鹽炒尉臍下又吊起一腳睡即尿又將孕婦睡短梯上用帶兜扎住倒懸片刻則尿自出或選二便門方用之以上胎前催生膏治交骨不開及各種難産用大龜全個初死者佳頭足血肉俱用約十兩外如無用生龜版一斤代以小磨麻油二斤熬去渣炒黃丹十二兩炒鉛粉四兩收每用四五錢皮紙攤貼臍上外用車前子四錢川芎當歸各三錢冬葵子二錢枳殼白芷半夏白蘞各一錢研末麻油蔥汁各一大鐘調藥敷於膏外紙蓋布扎令産婦平身安睡睡醒即産蓋睡則陰氣復母子皆有力也催生方取槐東引枝手把之又手捉鸕鷀頭甚驗又取馬銜一枚覺痛即令左手持之又急採樹葉一片或花或草葉皆好要新鮮青翠以淨水貼在床背勿令人知又取海馬或石燕子兩手各持一枚即産又取萆麻子十四枚每手各持七枚須臾立下又用新硃筆在黃紙上無新硃筆用新墨筆亦可寫語忘敬遺四字貼床柱及門窗上凡有門窗之處各貼一張臨産令産婦默念此四字即産可免邪祟又黃表紙朱書北斗紫英夫人在此八字貼於帳上即生如片時不應將黃紙揭下再貼産婦背心頃刻即下俟小兒及胞衣生下速即另備香紙將黃表字紙焚化送於流水遲則恐大腸隨下矣又鄉村僻壤無藥之處不幸遇此即覓花椒葉香櫞葉柚子葉茱萸葉生薑生蔥紫蘇濃煎湯一盆俟可下手即令産婦以小凳坐盆上澆湯淋洗其臍腹陰戶久久淋洗氣溫血行登時即産以上諸藥如全更妙若缺一二種亦不妨又用急流沙數升炒熱鋪於腹上先下墊蔥白再以沙鋪之又萆麻子七粒去殼研如泥入麝香一分再研成膏塗産母足心胎下即洗去遲則恐子腸出也如子腸出可移塗産婦頂心腸即收上速去之此方催生下胎雖速藥性猛峻用者慎之又烏梅一個巴豆三個胡椒七粒研末搗成膏酒醋調貼臍下即産又巴豆三個萆麻子七個共去殼搗爛入麝香少許油紙攤貼臍下三指産後立用濕布將藥抹淨免爛皮膚此與上兩方臨産艱難始可試用如未臨月誤用打胎徒傷孕婦耳慎之又名龜殼散能開交骨治難産及死胎敷之最妙龜版二兩川芎當歸各一兩發灰五錢加蟬蛻七個蛇蛻一條燒灰以蔥汁麻油調敷腹上閉目靜臥一時即生或加車前子一兩敷妊身熱病子死腹中烏頭一枚細搗水三升煮取大二升稍稍摩臍下及陰下胎當立出子死腹中醋炒黃牛糞敷肚腹上用布捆好即下又名立聖丹治橫生倒産胎死腹中用寒水石二兩生用二兩煅赤同研細末入硃砂五錢再研如深桃花色每用三分井花水調如薄漿糊以紙剪如杏葉大攤上貼臍心候乾再易不過三次即産逆産用手中指點鍋底黑煤於小兒足心畫一交即刻順生又鹽和粉塗兒兩足下即順又以鹽塗兒足以指甲搔之並以鹽摩母腹上即順又手足逆出者以真灶心土塗母臍中盤腸生臨産小腸先出不可用醋噴婦面恐驚則神散宜先以産婦髮梢或紙捻入鼻取嚏再放腸漆器中黃耆煎湯溫浸之自收又萆麻子四十九粒去殼研爛敷産婦頂心待腸收盡急抹去之勿遲此方須胞衣下後方可用然不如前方穩妥又産腸不收用芝麻油五斤煉溫熱令婦坐盆中浸之半時先用皂角炙去皮研少許入鼻作嚏立上或用蔥湯或用枳殼湯浸均可臨産胡言亂語用四焰燈火加硃砂入盞內點之即安四焰者一盞內用四燈頭是也臨産暈絶不省人事生半夏搗為丸如豆大納鼻中或研末吹鼻待嚏即蘇又覺暈即用三股麻繩長五六尺系産婦右腳膝上令人捉兩頭急挽得醒徐徐解之胞衣不下蔥白煎濃洗下部胞即下又取夫單衣蓋井上立出又當戶燒黍穰即出又用竹杆於堂中正梁上戮三下即下又取皂莢末著鼻孔中嚏即出又黑豆四五合醋三大碗煎數滾布蘸溫尉臍腹並厚敷之衣自下又萆麻子十四粒去殼搗爛敷兩足心衣即下下後速急將藥洗去久恐腸出如腸已出仍用此藥敷囟門上腸自收入藥隨洗去勿遲子死衣不出上搶心者急取蟻垤土三升熬之令熱囊盛尉心良以上臨産産後玉門不閉石硫黃研蛇床子各四分菟絲子五分吳茱萸六分搗為末以湯一升投方寸七用洗玉門瘥止又取大紙捻蘸油點火吹滅以煙燻鼻即閉又陽氣虛寒不閉用石硫黃海螵蛸北五味各等分共為末摻患處日三易玉門不閉或脫出溫水洗軟用雄鼠糞兩頭尖者是燒煙燻之即愈産後陰下脫取蛇床子一升布裹炙尉之亦治陰中痛以鐵精粉上推納之又蜀椒吳茱萸各一升戎鹽半雞子大搗以綿裹如半雞子大納陰中日一易二十日愈産後玉門腫痛蛇床子三兩煎湯頻洗即愈又蔥白和乳香搗成膏貼腫上效又桃仁炒研細末敷又羌活防風各一兩煎湯熏下體亦消初産傷重玉門腫痛濃煎甘草湯洗之其腫自平陰戶破爛久不收口白芨白龍骨訶子爛蜂窠黃柏炒各一錢研末先用野紫蘇煎水洗擦干再用此藥敷之效産後陰翻澤瀉四兩一方作澤蘭葉未知孰是煎湯熏洗二三次再加枯礬四錢煎洗即安産後陰戶垂出肉線長三四尺觸之痛引心腹老薑三斤連皮搗爛入真麻油二斤炒乾先用舊綢五尺摺疊輕輕承起肉線使之屈作二三團納入陰戶再用綢衣盛薑使薑氣就近熏之冷則隨換熏一日夜收入大半二日收盡神效非常肉線切不可斷斷則不治並宜禁風産後腹痛苧麻安腹上又兔頭炙令熱以尉産婦腹如刀絞痛者立定又取一苦瓠蘆未經開者開之去子訖以沸醶酢投中蒸熱隨痛尉冷即換極效又因感寒起者用陳蘄艾二斤焙乾搗鋪臍上以絹覆住尉斗尉之口中艾氣出痛自止産後防暈舊漆器不拘多少烈火燒煙燻鼻中即醒産後血暈切韭菜安瓶中沃以熱醋令氣入鼻中又枕苧麻即止惡露不下馬檳榔去殼兩手各握二枚立下産後惡露奔放不止用帶舊黑氈帽帽內招牌紙宜剝淨墊住産門即止産後小便不止厚肉桂一兩丁香三錢為末作餅放臍上即止産後脫肛荊芥末鱉頭灰蜜調塗肛上以陳年草鞋一隻烘熱緩托上數次可愈産後宜擠兩乳凡婦人初産即將兩乳放溫熱淘米水內揉洗良久將乳擠出乳孔內有白絲數條即用手扯去方與兒食不但小兒易食且免乳吹乳癰等患此祕法也又乳不通用麥芽煎洗以木梳梳乳千遍即通以上産後婦人陰脫煎羊脂塗並治赤丹如疥陰蝕蚯蚓三四條炙乾為末蔥數條火上炙乾為末先以蜜一碗煮成膏將前二味搗放其中納入陰戶蟲盡死又當歸甘草炙川芎芍藥各二兩地榆三兩切以水五升煮取二升洗之日三夜一又蒲黃一升水銀一兩研之以粉患處陰戶蟲癢炙豬肝納入當有蟲出又杏仁去皮燒存性研爛綿裹納入又雞肝去脂乘熱納入蟲盡死又蜂蜜煉過二兩甘草研末三兩二味和勻敷癢處蟲自出再以蛇床子朴硝各一兩煎湯頻洗更效並治糞門生蟲陰瘡紫葳為末用鯉魚腦或膽調塗又硫黃末敷又桃仁杵爛綿裹塞又杏仁燒研末雄黃礬石燒各二分麝香五釐和敷之日三度又陰瘡如蟲咬癢痛者生搗桃葉綿裹納之一日三四易又陰戶內生瘡作癢用活蚌一個剖開將有肉半個手拿對陰戶一夜次日又用一個全安陰癢或生濕瘡蛇床子地骨皮各三兩煎湯熏洗一日兩次二三日效又胡麻嚼爛敷之並治陰挺又鯽魚切片以稀布裹納陰戶內其蟲盡入布眼納二三次以出盡不癢為度再用蛇床子朴硝各五錢煎水二碗洗瘡拭乾以乳香沒藥各一錢五分研末加枯礬六分擦之尤效又蛇床子一兩艾葉明礬五倍子杏仁杵碎各五錢川連三錢煎湯先熏後洗即愈陰腫甘菊苗杵爛煎湯先熏後洗又作癢者大蒜三兩切片煎湯洗之並治陰挺又産門兩旁腫痛手足不能伸舒用四季蔥入乳香末同搗成餅敷患處陰中腫痛炙枳實以尉之又防風三兩大戟二兩艾五兩切以水一斗煮取五升溫洗陰中日三次良又礬石熬二分甘草炙五釐大黃一分搗篩取棗大綿裹納陰中二十日即瘥陰戶疼痛食鹽炒熱青布包裹尉之又蔥頭加乳香搗融敷之極效又癢痛不可忍者枸杞根一斤水三升煮十沸適寒溫洗之並治陰腫或生瘡子宮大痛不可忍五倍子白礬煎湯熏洗又將二藥研細末摻之陰挺白果嚼融敷之又川椒烏頭白芨各二分為末綿裹納陰令入三寸腹中熱明旦更著瘥止一方無川椒又水仙花兜交紅糖搗極融爛敷之又茄根燒存性為末油調在紙上捲筒納陰中一日一上又鯽魚生煎煉油塗之或用鯽魚膽搽之又藜蘆為末豬脂調塗一日一易胬肉自入又槐白皮炒煎水日洗數次甚效又大蒜煎湯洗婦人交合痛不可忍黃連六分牛膝甘草炙各四分上三味切以水四升煮取二升洗之日三四度瘥止交接傷陰出血不止五倍子研極細末摻之雞眼痛生車前草搗敷之甚良又生蔥剖開取有沫一邊貼患處包好三日愈腳丫及足底彎曲處作癢枯礬五錢熟石膏輕粉黃丹各三錢共研末開水候溫洗淨擦之即愈又如破爛有膿水者蔥湯洗淨用海螵蛸去硬板三錢人中白三錢冰片三分共為末每用一錢搽之效兒科初生氣絶不啼切勿斷臍即取小鍋燒水以胎衣放熱水中並以水澆臍帶俟暖氣入腹兒氣即回啼聲發出矣若先斷臍帶者不治初生去毒開口法小兒初離母體口有液毒形如血塊啼聲一出隨即咽下而毒伏於命門他日發為驚熱瘡疾惡痘等症須於未啼時急用絲綿裹指挖去口內濁穢以清臟腑小兒初浴新生時用益母草五兩煎水浴不生瘡疥初生無皮色赤有紅筋乃受胎未足也用早稻白米研細末頻撲之皮膚自生名先天粉又以東向陳壁土研細末摻之亦能生皮初生遍身紅赤用浮萍水苔搗取汁調朴硝赭石末敷之初生遍身如魚脬或如水晶破則水流不止以密陀僧研細末手丰色之三朝浴兒取桑槐榆柳桃嫩枝各二三十段煎湯候溫浴兒可免瘡疥治兒啼取犬頭下毛以絳囊盛系兒兩手立效夜啼不止黑牽牛子一錢研極細末水調敷臍上立止又五倍子研末以津唾調作餅子貼臍上用帶扎之效又硃砂磨新汲水塗心窩及兩手足心五處最驗又用本兒初穿汗衣放瓶內自不哭又明鏡挂床腳下自止曲腰啼哭此受寒腹痛也用淡豆豉生薑蔥白細切鹽共炒熱以手巾包尉肚上立止遍身奇癢叫啼不止生薑搗爛稀布包擦甚效身如蛇皮鱗甲名胎垢又名蛇胎用白殭蠶去嘴為末煎湯洗之或加蛇蛻研末和入亦可身熱苦參二兩煎湯浴之又郁李根煎湯浴壯熱李樹葉一斤煎湯浴之良並治小兒瘧疾及驚癇小兒瘟瘧積熱不解菖蒲煎湯浴初生瘧疾赭石二錢醋煅硃砂五分砒霜二分共為末以紙包七重打濕煨乾入麝香一分再研細麻油調搽鼻尖上及眉心四肢神驗患黃韭根搗汁日滴鼻中取黃水出愈或用黃疸門黃蠟紙筒方治之穩而且妙小兒客忤發作有時取母月衣覆兒上大良赤白痢莨菪子羊肉薄切布上綿裹納下部不過兩次瘥飲食停滯飽悶不消糯米一升炒熱分作二布包輪尉臍腹助其脾氣轉運立消傷冷食及難化之物生薑切片紫蘇各四兩煎濃湯置浴盆令小兒乘熱坐湯以手揉其胸腹以熱湯淋之氣通即化或用二味搗爛炒熱分作兩布包輪流尉胸腹如冷再炒再尉神效小兒無故卒死取蔥白納入下部及兩鼻孔氣通或嚏即活痰喘巴豆一粒研爛綿裹塞鼻男左女右痰即自下截驚以芭蕉汁薄荷汁煎勻塗頭頂留囟門塗四肢留手足心勿塗甚效預斷驚風於小兒臥室養鴿數對令小兒日嗅鴿味自免急驚風大梔子一枚研末雞蛋一個去黃用白調勻搽兒腹四圍又明雄黃五錢砂仁六分梔子五枚炒冰片五釐共為細末以雞子清調敷肚之四圍如碗口大安臍眼入麝香五釐上用綿紙蓋好再以軟綿扎之一晝夜後溫水洗去神效又甜杏仁桃仁各六粒黃梔子七個共研爛加燒酒雞子清白乾面量患者年歲作丸如胡桃大小男左女右置於手足二心用布條扎緊一周時手足心均青藍色則病已除矣效甚慢驚風大紅芙蓉花一朵將花心緊對小兒肚臍中貼再用雞蛋一個煎餅置花蒂上一時即轉又胡椒七粒生梔子七個蔥白七根飛面一撮共研末杵和再加雞子清半個調勻攤青布上貼小兒心窩一日夜除去有青黑色即愈如不效再貼一服愈後仍當服補脾之藥急慢驚風白頸蚯蚓刀截兩段跳急者治急驚跳慢者治慢驚加入麝香一分搗爛貼當臍外以膏藥蓋之又用白絲毛雞烏骨緑耳又名絨毛雞又名白鳳凰多出江西泰和縣以雞尾糞門向小兒肚臍上無風雞則遠去有風雞必貼緊吸拔風毒少時即愈神效之至愈後須用麻油灌入雞口以解其毒並治大人陰症又杏仁桃仁糯米胡椒梔子各七枚共搗極爛用雞子清調飛羅面敷足心男左女右敷過夜次日腳板甚青黑即愈又芙蓉嫩葉約五六瓣男單女雙一作男雙女單搗爛用雞蛋和入煎熟作餅貼臍上冷則隨換立愈驚風煩熱慎火草煎水浴之暑驚生半夏皂莢等分研末吹鼻取嚏即愈老少並用烏痧驚風遍身都烏急推向下用黃土一碗研末入陳醋一鍾炒熱包定尉之引下至足刺破為妙小兒疳疾及諸病後天柱骨倒乃體虛所致宜生筋散貼之木鱉子六個去殼萆麻子六十粒去殼研勻先包頭擦項上令熱以津調藥貼之小兒鼻塞頭熱用薰草即蕙一兩羊髓三兩銚內慢火熬成膏去滓日摩背上三四次頭縫不合即解顱防風白芨柏子仁各等分為末以乳汁調塗一日一換又幹薑七錢細辛三錢肉桂五錢共為末薑汁和敷顱上小兒面赤即愈又南星微泡為末醋調攤舊綢上貼囟門用熱手時時尉之干則用熱醋潤濕又茵陳車前子百合各五錢為末烏牛乳汁調塗足心及頭縫開處用綢包裹二日一換囟腫生下即腫者黃柏末水調貼足心囟門陷下乃受冷所致用半夏末水調塗足心小兒發遲陳香薷二錢水一盞煎三分入豬脂五錢和勻日日塗之又楸葉中心汁頻塗小兒閃癖頭髮覺黃極瘦弱者干林檎脯研末和醋敷之頭面胎毒桐油調輕粉塗之多年不愈皆效小兒癤愈後脫疤不長髮用飯蠅搗塗立生禿瘡松香研末五錢豬脂調搽一日數次數日即愈又醃茄子炙灰麻油調塗蟺疒貢頭活蝦蟆一隻剝一整皮貼瘡上奇效又大蚌肉搗爛加冰片少許攤患處立愈一切頭瘡松脂研細輕粉各五錢和勻油調敷黃水頭瘡即肥瘡水邊烏柏樹根曬研末四五錢雄黃一錢生油調塗又雞蛋三個煮熟去白用黃炒枯出油搽上三五次即愈小兒目閉桑葉白菊花煎湯以青綢擦洗之蓐內赤眼生地黃薄切冷水浸貼又取黃柏以乳浸點之又雄雞膽燈心蘸點神效又胡黃連一錢研末人乳調敷足心男左女右又以蚯蚓泥搗敷囟門干則易三次愈又生南星生大黃等分為末用醋調塗兩足心又茶調胡黃連末塗手足心即愈眼痛取淡竹瀝拭之又鯉魚膽點之車前草汁和竹瀝點之誤將竹木刺眼白頸蚯蚓掐斷滴血入眼刺即出小兒耳內濕爛上梅花冰片二分爐甘石煅一錢枯礬粉口兒茶各三分龍骨煅海螵蛸赤石脂各一錢橘皮炭三錢蠶繭殼石首魚腦骨煅研細各二枚上共為細末加胭脂邊二錢用紙包固以水浸濕用火煨炭存性和勻再研吹之極效耳瘡馬骨煅存性研末敷之又雞糞白敷之佳耳疳地骨皮煎湯洗仍以香油調末搽鼻衄不止以馬糞綿裹塞之又燒發灰末吹鼻又燒桑耳令焦搗末納鼻孔中作丸塞之亦得生下腮腫黃柏末水調貼足心效痄腮兩腮腫硬有核又名螳螂子麝香一錢硃砂五分螺螄七個同搗如泥敷囟門上俟干時自落切勿剝去若重者將針微刺患處出血以好陳墨搽之自愈或溏雞糞塗之更妙切勿妄用刀割致傷兒命後有芙蓉花諸方最妙又蜒蝣一條銀硃一錢五分同研爛搽腫硬處勿令擦去即消又絲瓜燒存性研末水調搽之又橄欖核醋磨濃汁以鴨毛蘸塗數次即效又桑柴灰少許入雄雞冠血二三滴再加鹽滷一匙和勻時時搽之初生小兒或兩腮腫硬或口內生瘡或生馬牙或重舌木舌蛇舌吐舌及口不開不食乳等症芙蓉花或葉或皮或根捶極融爛用雞蛋二個和勻煎熱候冷敷心口並肚臍用布扎緊屢試如神又生香附生半夏各二錢研末生雞子清調作餅貼兩足心一周時即愈此引熱下行法也又吳茱萸四錢好醋調敷兩足心又如口舌破爛者用活鯽魚以尾入口中頻頻搖擺隨擺隨換能去口中熱毒初用時兒尚啼哭用一二次後口內生涼兒自不啼尾雖有刺甚軟並不傷人治後即能食乳不過三日全愈鼻疳蝕爛膽礬燒煙盡研末摻之一二日愈口疳甘蔗皮燒灰研末吹之效又吳茱萸二兩研末少加麵粉醋調作二餅貼兩足心以布扎之過夜即愈並治咽喉疼痛口瘡荸薺燒存性研末摻之又寒食麵五錢硝石七錢水調半錢塗足心男左女右口角生瘡亂髮燒灰豬油調搽又蒸飯時收甑蓋上流下氣水搽之效口流涎水新桑根白皮搗自然汁塗乾者煎濃汁塗之效口生白點俗名雪口又名鵝口馬蘭頭搗汁抹之神驗又檳榔燒枯研末點之立效又黍米嚼濃汁塗效又赤小豆研末醋和塗並治重舌唇腫桑木汁塗之唇緊赤莧搗汁洗之又馬芥子搗汁曬濃揩破頻塗之又頭垢塗之重舌黃柏浸苦竹瀝點之又巴豆半粒飯四五粒共搗爛為餅如黃豆大貼在印堂中待四圍起泡去之即愈各項舌病皆效舌膜初生小兒有白膜皮裹舌或遍舌根可用指甲刮破令出血以燒礬末拌如緑豆大敷之若摘去兒必啞舌筍小兒不吃乳啼哭即看舌上倘起白泡一粒名舌筍不治即死急用鮮生地取汁如無鮮者以乾生地涼井水浸開搗爛取汁塗患處數次漸愈木舌黃葵一錢為末黃丹五分和敷又蒲黃研末時敷舌上其腫自消舌忽脹大腫硬即時氣絶名翣舌百草霜酒調塗舌上即消又幹薑蒲黃等分為末乾擦患處蛇舌其舌常卷兩邊口角者是明雄黃研末點舌數次即安舌瘡飲乳不得白礬和雞子置醋中搽兒足底自愈語遲小兒四五歲只會叫人不能言語以赤小豆研末酒調塗舌下二三次即能説話喉嘶聲啞蝦蟆膽取汁點舌上立愈頸軟乃肝腎虛風襲入用生附子去皮臍生南星各二錢為末薑汁調攤貼天柱骨上項上瘰癧以榆白皮爛搗如泥封之頻易乳癖白芥子研末水調攤膏貼之以平為期龜背龜尿調首烏末敷背上日久自愈背上起白泡纍如綴珠一二日即破膿血外流癢甚一處方好一處又起者如意草搗爛敷之長巾縛定一夜即愈腹鳴如蛙淡豆豉生薑各二錢切碎蔥五莖食鹽一兩同炒熱置臍上尉之效又蔥薑煎濃湯洗肚腹另用蔥薑搗爛炒熱作餅貼臍上良久即愈盤腸內釣腹痛蔥湯洗兒腹仍以炒蔥搗貼臍上良久尿出痛止肚臍腫出紅飯豆淡豆豉南星去皮臍白蘞各一錢共為末用芭蕉無葉用根自然汁調敷臍四旁即愈臍爛成風杏仁去皮研敷臍風嘬口以艾葉燒灰填臍上用帛纏之若臍帶已落用蒜切薄片貼臍上以艾火灸之候口中有艾氣立愈預防臍風枯礬硼砂各二錢五分硃砂二分冰片麝香各五釐共為末凡小兒下地洗過後用此末摻臍上每日換尿布時仍摻此末摻完一料永無臍風等症臍內汁出不止兼赤腫取東壁土末敷之又大紅呢燒灰為末敷之又甘草炙螻蛄熬各三分搗末安臍中瘥止又黃柏炙一兩釜底墨四分搗末敷臍中良又白石脂一兩研末熬令溫以敷臍瘡甚良臍不幹棉花子燒灰每用一錢敷之又當歸煅焦研末胡粉等分敷之臍瘡馬齒莧燒研末敷之初生腎縮乃受寒所致用硫黃吳茱萸各三錢研極細末搗取蔥汁調藥末塗臍腹另以蛇床子燒煙燻之即伸初生陰囊過大名胎疝久恐變成木疝如過滿月外或一歲以內俟端午日午時以腳盆盛熱水安於中堂隨抱小兒將陰囊放水內一浸再將小兒在於中門檻上中間一擱其陰囊上之水印痕於檻將艾火在檻上濕印處燒三次其囊逐漸收小如故神效又石蟹用好醋磨汁搽之㿉疝胎疝雙蒂茄懸房門上出入視之茄蔫所患亦蔫茄干亦干矣又法雙茄懸門上每日抱兒視之二三次釘針於上十餘日即消腎囊虛腫甘草濃煎汁調地龍糞搽之陰囊赤腫老杉木燒灰存性加宮粉和清油調敷忽然陰腫此被蚯蚓吹腫令婦人以吹火筒吹之即消又真硼砂研末水調敷又雄鴨涎抹之即消陰囊腫墜光亮啼哭疼痛蟬蛻一兩煎湯洗再用生紫蘇葉搗成泥包之而愈或用乾紫蘇研末濕則干敷干則香油調敷雖皮破子出悉有神效初生小便不通用豬毛於陽物眼上刺去薄皮即通小便數日不通遍身腫滿蘇葉一斤煎濃湯一盆抱小兒向盆中熏之冷則再換熱湯外用炒鹽尉臍上及遍身腫處即愈又連須蔥白一斤搗融炒熱分作二包輪流熱尉臍下又皂角末吹些須入鼻令其噴嚏百藥不效者用此即通又嚼生蔥以綿裹少許納小便道中即通初生糞門閉塞以金銀簪挑開一孔不可過深用油紙捻套住免其再合大便不通白蜜一合煎為丸納下部中即通初生大小便不通急令婦人以熱水嗽口吸吮小兒前後心及臍下數次即通一方並吸兩手足心共七處又連須蔥頭七個生薑一大塊豆豉食鹽各三錢同搗作一餅焙熱掩肚臍上帶扎住良久自通胎癩土茯苓二兩焙研苦參五錢焙研陳芭扇一兩炙用柏油一杯調塗可除根此藥初搽必痛過時即止勿畏也水腫從腳起入腹則難治油杉根切碎杉木切斷內色紅者是油杉若色白者不堪用煎濃湯將腫腳先熏後洗一二次自消又以紅糟一大碗加生薑生蔥三味同煎湯先熏後洗小兒丹瘤萆麻子五個去皮研入面一匙水調塗之甚效丹毒蕎麥麵醋調塗又慎火草搗以封之瘥止又搗藍汁塗之又藍靛塗之妙又苧麻根搗汁頻浴效又丹毒遍身百方不效者用蕓薹菜葉即油菜搗爛敷之隨手即消如無生菜以乾者為末水調敷火丹熱如火繞臍即損人馬齒莧搗塗之又搗梔子調水塗之又桑白皮煮汁浴或為末羊膏和塗五色丹遊多致殺人敗蒲席燒灰和雞子白塗之效赤白遊疹火焱熱瘡藻菜搗爛封之嬰孺風疹在皮膚不出及熱瘡丹毒慎火苗葉五兩和鹽三兩同絞汁以熱手磨塗日再蟲瘡榆皮末和豬脂塗綿上覆之蟲出立瘥天泡瘡藍葉搗敷之良浸淫瘡燒艾作灰敷之又以牛屎燒作灰敷之惡瘡取筍煮汁洗之又燒筍皮作灰敷之又取豆豉熬令焦黃末以敷之瘥止蠼螋瘡燕窠土研末以豬脂和塗之干易疳瘡嚼栗子塗之瘥癬瘡枸杞根搗末和臘月豬膏敷之又煎馬尿洗之又揩破以牛鼻上津塗之濕癬桃樹青皮為末和醋頻敷之疥癬藁本煎湯浴之並以浣衣痘瘄免出痘法陳夕昏黃時取大黑魚一尾小者用二三尾煮湯浴小兒遍體須七竅俱到可免出痘不可嫌腥而另以清水灌濯如不信試留一足一手不洗他時痘多出在不洗處此方異人所傳毋以易而忽之不出天花經驗方天麻子三十粒去殼衣揀肥大者硃砂一錢揀明透者麝香五釐揀真淨者上三味先將硃砂麝香研極細末後入天麻子共研成膏於五月五日午時擦小兒頭頂心前後心兩手心兩足心兩腳灣兩脅共十三處俱要擦到不可短少擦如錢大勿使藥有餘剩擦後不可洗動聽其自落本年擦過一次出痘數粒次年端午再擦一次出痘三粒再次年端午再擦一次永不出痘如未過周歲小兒於七月七日九月九日依法擦之更妙男女治法皆同傳方之家不出天花三世矣又凡嬰兒不論男女用川楝子選肥大光潔者於石臼內搗爛一歲至三歲七個水三碗四五歲者九個水五碗六七歲者十五個水七碗八歲至十歲者二十個水九碗十一歲至十五歲者用川楝子三十個水十五碗新砂鍋煎濃傾入盆內避風處將新白布一方蘸水自頭至足遍身洗擦不留余空仍將布擦乾避風一刻搗藥忌鐵器非但不出痘且免瘡癤洗浴日期須擇七個除日洗七次如五月至八月初止內有七個除日俱在熱天更妙解穢法凡犯房事經水生産穢以大棗燒煙解之若防發癢者以樺皮和大棗燒煙解之被酒氣犯者以葛根茵陳蒿燒煙解之犯五辛氣者以生薑燒煙解之被死尸氣及癘氣所犯者以大黃蒼朮燒煙解之被狐臭犬羊氣犯者則燒楓樹葉解之若遇風雨時者則燒蒼朮楓樹葉解之若血少而漿難之痘則忌燒蒼朮蓋恐愈燥而漿愈難耳若遇諸惡氣則以乳香燒煙燻之以胡荽酒噴之俗有煮醋熏痘者以醋能活血殊不知醋能收斂大非所宜也暑月出痘房中多置涼水以收熱氣心自清涼冬月出痘房中多置炭火以除寒氣使血氣和暢為妙防痘入目胭脂不拘多少口中嚼汁頻揩眼眶則痘不入目如已見點用牛蒡子不拘多少在母口中嚼爛貼兒頭囟門甚良又白芥子末水調塗足心引毒歸下令瘡疹不入目痘出眼中本兒生母中指上刺血一點滴入眼痘即移出又豬血點之即不生翳又黑狗耳上血一滴點眼內其痘即除又鱔魚尾血點之即移開又象牙磨水滴入眼中即退又蜒蝣蟲放眼皮上周圍走動吐出涎水其痘自散屢效又細茶葉口嚼敷眼外又鯽魚膽點之良鰱魚膽亦可又益母草浸水點之又輕粉少許東丹倍用共研末捲入紙條剪斷見藥或注蔥管內入耳內左眼則置右耳右則置左即移去並治痘後目中有翳出痘眼目紅腫人乳汁蒸熱點之又金銀花胭脂人乳汁取燈心蘸點之出痘眼有膿血兔子糞清油調塗出痘眼痛翳子草搗爛左眼痛塞右鼻右塞左鼻舌與鼻孔有痘黃丹老土磚共為細末吹之又青扣布燒灰吹之又硼砂檀香燒枯共為末吹之又先用皂角末吹入再用黃蠟塞鼻舌上有痘人中白焙硼砂兒茶共為末摻舌上又先用茶洗淨將京墨磨水粉調塗之又先用鹽茶洗淨用黃柏黃連元參苦參共為末蜜調塗之又鴨糞燒灰研末鴨毛蘸摻之舌上爛痘用油胭脂敷最妙又硼砂水飛冰片點之出痘腎腫桑樹皮細茶生薑槐樹皮共搗清油拌炒包之又若腎紅腫取藍靛腳汁擦之或用青黛敷之又如風腫者用鹽炒熱尉之或用槐花葉炒熱敷之腎嘴有痘公鴨嗄氣數次即消陰口有痘女子陰內有痘同雄黃研末清油攪勻鴨毛蘸擦痘症小便不通細茶嚼融紙包敷臍上又樟樹皮薑蔥老艾共搗爛炒熱放小肚上女人放陰門上即通痘症大便不通蔥一把搗作餅敷臍上用錫壺盛滾水尉蔥上即通女子出痘天癸忽至月月紅連枝葉煎湯抹周身孕婦出痘腹痛胎動益母草蓮蓬殼俱燒存性艾葉共研末醋調敷臍連換三次胎自安又或胎欲下及死胎不下蜣螂蟲連所堆泥一併焙末加威靈仙同研用酒調為丸納臍中將膏藥貼住不拘何項膏藥三炷香久為度其胎即下並治經閉不通悶痘及毒重悶痘毒重至三四朝後或二便下血極危者覓活蟾蜍至少四五十隻將兒脫盡衣裳蓋在被內令側臥輕將蟾堆在前後心以次排放至下身蟾得溫氣自能將頭頂住兒身兒得蟾酥開竅痘自出矣不要驚動一晝夜後將蟾取出用冷水頻頻浴之以解痘毒切不可傷之冬間蟾在向陽桑樹下掘之可得雜痘一齊湧出楊柳葉柑子葉老艾葉臘樹葉共煎水遍身洗之即退又清油一杯白蠟生薑汁硃砂雄黃共熬熱從頭至足遍身一揩雜痘一退正痘即見痘症發熱胡言亂語千腳泥搗碎雞子清調敷臍上又藍靛腳汁一杯燕子泥調敷臍上燒五寸香久取去又生蘿蔔搗爛和鉛粉作餅敷腳心又燕子窩泥雞子清調餅敷臍上又小雄雞一隻剖開用雄黃麻油塗入雞肚內將雞敷臍上最穩最妙並治痘齊熱退愛睡地上皮肉紅腫而痘不腫黑豆緑豆紅飯豆共研細末再將醋研為濃汁以鵝毛掃之神效痘瘡發癢茵陳燒煙燻之良痘中生蛆癢不可忍桃葉不拘多少揉軟蓋在痘瘡上並墊身下即消又醋湯遍身噴之又嫩柳葉鋪席上臥之蛆盡出而愈痘瘡黑陷沉香檀香乳香各等分爇於盆內抱兒於上熏之即起痘中黑疔將疔挑破出紫血以蒲公英膏塗之痘症潰爛膿水淋漓多年蓋屋茅草洗淨焙乾為末摻之神效又松花粉摻之效又黃牛糞焙乾研末清油調敷又紫草麻油熬成膏和白蠟再熬數滾取起敷之爛痘及面上抓破者密陀僧滑石各二兩白芷五錢共研極細末濕則乾摻之或用白蜜調敷良痘不落痂羊脛骨髓同煉蜜一兩輕粉一錢和成膏塗之痘痂即落且滅瘢痕又豬骨髓白蜜共搗勻火上熬三五沸待冷用雞翎刷上數次即落又十二朝不落不免痘毒等症煮雞蛋黃去白用鐵杓炒取油冷定雞毛蘸塗立落如神痘毒糯米粽尖焙灰冷定同百草霜拌勻灑毒上神效又生螃蟹飛羅面搗膏貼患處效又陳小粉山藥共搗爛敷患處干則換毒即退如已爛用杜仲牡蠣煨石膏各等分研細以白蜜調敷乾摻亦可移痘毒法痘毒生要害之處如兩臂灣兩腿灣謂之四環痘毒不傷命即殘廢當用移毒之法以生黃豆在口中嚼爛塗痘毒上不必留頭連塗數次輕者消散重者移生他處極效痘後餘熱結毒纏綿不愈赤豆黃豆黑豆各等分浸水中一日搗爛塗患處干即更換敷上用油紙隔包好立愈名三豆散痘後餘毒結成癰疽連珠不已馬齒莧搗汁豬油白蜜各一碗共熬膏塗之並治年久惡瘡頭上禿瘡痘後風眼或起翳或紅赤經霜桑葉七片或冬至收或立冬收蒸水半鍾加入食鹽少許早晚洗又頂上胭脂泡水鋪紙上以新筆在紙上蘸水一日點三次三日即愈又仰臥床上取黃鱔尾上血滴入閉目少頃拭去一日三五次即愈重者數日全愈但必須鱔魚尾血每次換一鱔用過即放去諸藥不效者此最應驗痘後兩目難開燈心蘸清油潤眼上又黃柏末入水久浸將紙染濕鋪眼胞又黃連黃柏黃芩元參乳汁調勻飯上蒸擦之又黃豆口嚼成餅敷之又自己熱小便黃紙浸濕貼之痘後耳內腫痛時流膿血先用棉花攪淨膿血然後用黑砂糖調水少許滴入耳中其痛立止其汁自干戒勿抓挖即愈痘後肚腹腫脹黃柏苦參共為末清油調勻熬過作膏貼之又桐子葉滾水泡軟用清油雄黃塗葉上貼三五次效又燈花數十朵入鹽炒過加鉛粉調成餅貼臍上痘後遍身無皮膿水不絶茶葉去梗熱水泡透鋪床上睡上一夜膿水自干痘後蟲蝕疳瘡膿水不絶出蛾蠶繭不拘多少將生明礬末入內填滿燒令汁盡成灰為末摻之即愈痘風瘡逢春即發黃丹黃芩黃柏大黃輕粉共為末豬油調敷疹發未透冒風忽隱腫脹氣促命在頃刻者生蔥頭一二斤連須搗爛放盆內盆置床上帳中盆面橫一板將兒坐於板上然後將滾水衝入盆內以蔥氣熏兒周身稍溫即抱起在帳內勿受一線風吹疹仍透出而安麻發不透氣喘欲死芝麻五合以滾水泡之乘熱熏頭面即發又沉香木香檀香不拘多少於大盆內焚之抱小兒於煙上熏之即起麻症作癢好白蜜調水以鵝翎時時蘸掃瘄乖用桃葉浸鹽滷擦羊毛疹眼目黃色指甲多紫色用燒酒摶黃土慢揉擦心口
