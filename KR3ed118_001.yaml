body:
  text: 卷一傷寒點眼角法粉甘草六分頂上梅花冰片四分共研極細末凡病起一日至六日用此藥點眼角內分男左女右出汗即愈如過七日不論男女兩眼並點神效蔥薑尉法治傷寒胸膈不寬作痛一切寒結熱結食結痰結痞結水結等症並中氣虛弱不堪攻擊者以此法尉之則滯行邪散其效如神連須蔥頭一大把老生薑二大塊生蘿蔔四五個如無以蘿蔔子一合代之三味共搗爛炒熟酒炒更妙用布分作兩包輪換久久罨尉心胸脅下痛處無不豁然自開汗出而愈如數次炒乾則烹之以酒且不宜大熱恐炮烙難受若大便祕結宜兼尉臍腹蔥尉法寒中三陰口噤失音四肢強直攣急疼痛兩手無脈似乎中風者或厥逆唇青男子腎囊縮入婦人乳頭縮入或男婦交合後氣絶等症俱用蔥白一斤微搗炒熱分二包輪換尉肚臍下久久俟暖氣透入自愈並以蔥白三寸搗爛酒煎灌之陽氣即回此華他救急方也或用罐裝熱火或裝滾水放炒熱蔥上尉之更妙病重者更以艾丸如豆大燒氣海穴臍下一寸五分關元穴臍下三寸各七次則脈漸現手足漸溫可得生矣紫蘇尉法傷寒內傷積食蓄血小腹硬脹大小便不通不能言語神思欲脫兩目直視手足強直證候危篤難以下藥者用紫蘇半斤煎濃湯將大手巾折數層蘸透熱絞略干乘熱攤病人肚上至臍以下用手在巾上旋摩冷則再換如此數次候暖氣透入其一切宿糞硬塊積血自下其效如神如肛門祕結不通須以蜜糖和豬膽熬煉成條插入糞門導之自通但積糞須用藥調理阮河南蒸法薪火燒地良久掃除去火可以水小灑取蠶砂若桃葉桑柏葉諸禾粳及麥皮皆可取用易得者牛馬糞亦可用但臭耳桃葉欲落時可益收取干之以此等物著火處令厚二三寸布席臥上溫覆用此發汗汗皆出若過熱當細審消息大熱者可重席汗出周身輒便止當以溫粉粉身勿令遇風野芋頭擦法野芋頭切片磨擦背上第三骨節如覺痛癢者即非傷寒若不知痛癢即是仍用野芋頭片周身骨節用力擦勻並用芋片炒熱煎濃汁服二三次即愈忌食葷並飯傷寒不能分陰陽目定口呆身熱無汗便祕不省人事用煮雞蛋砌臍四旁或用老油松節七兩胡椒照病人年紀每歲七粒煮蛋乘熱切頂殼三分覆臍眼面作團護住冷易視蛋黑為驗收盡陰氣自愈又方用煮雞蛋去殼乘熱滾擦亦能變陰為陽名蛋尉法用吳茱萸一升搗碎酒拌濕布袋二個分包甑蒸透多尉兩足心兼尉肚臍下候氣透手足暖為度或加麥麵食鹽蔥白等分同炒熱尉亦可冷則再換傷寒表未解寒邪挾濕身目發黃濕盛於熱則黃色晦熱盛於濕則黃色明晦為陰明為陽用生薑汁和茵陳汁點眼遍身黃者並擦胸前四肢周身汗解或用煨薑絞汁和香油點眼又陰黃用丁香和茵陳擦如上法又濕熱發黃昏沉不省雄雞破背帶毛血合胸又治發黃用赤小豆瓜蒂黃米同研末吹鼻或綿裹塞鼻各竅出黃水愈但勿深入傷寒無汗紫蘇煎濃湯熏頭面及腿彎又麻黃去節同甘草研末加冰片點兩眼角暖蓋靜臥避風自汗不汗熱湯催之又胡椒天麻銀硃棗肉丸握掌心或用胡椒丁香蔥白搗塗兩掌心夾腿內側取汗治陰寒症皆宜又代赭石乾薑等分為末熱醋調塗兩手心合掌握定夾於大腿內側溫覆汗出乃愈傷寒汗出不均腹背手足搐搦川烏海蛤炮山甲各一兩酒丸彈大置足心別劈蔥白蓋藥帛纏熱水浸腳至膝取汗須避風並治中風手足不隨及風濕腳氣等症傷寒結胸停食陳香糟六兩生薑水菖蒲各四兩鹽二兩共搗勻炒熱為餅貼胸前痛處以火尉之內向即去如口渴任其飲水吃茶大便利下惡物即愈名糟蒲餅傷寒發散未透餘毒積於經絡其症耳後紅腫頭重體倦名發頤在腮曰穿腮在地閣曰穿喉皆痰熱之毒也按腮內痠痛者曰窄腮不痠痛者乃是發頤天南星熬膏敷輕者用靛花或鹿角磨塗重者用皂角南星糯米末薑汁敷又赤豆側柏葉雞子清搗塗又絲瓜燒存性雞子清調敷又醋調壁土敷又大黃五倍子白芨等分研末雞子清調塗傷寒吐蛔花椒烏梅肉搗餅擦胸口傷寒發狂目不識人或見鬼神用癩蝦蟆貼心上最妙又譫語熬鹽尉又狂走者炭盆潑醋使聞或用薑汁雞子清調硃砂元明粉塗胸口又發狂兼發斑疹不發斑疹者亦效斑重者多用癩蝦蟆貼之惟肝不宜多用急用銅錢於脊背兩手彎兩乳旁兩腿彎刮出青紫色隨取癩蝦蟆一隻目紅皮紅腹無八字紋者勿用破開去腸肚等物貼心坎上取蝦蟆肝煎水服之並用煮熟雞蛋去殼於刮傷處乘熱滾擦隨滾隨換其病頓減有起死回生之功滾過雞蛋埋入土內不可使雞犬誤食此苗人祕方也無癩蝦蟆用雞亦可不必食肝然終不如蝦蟆之妙又先用紋銀放臍上再用燕子窩泥搗融和雞蛋煎成一餅敷上冷則隨換數次即愈傷寒感冒生薑蔥白核桃細茶黑豆煎湯沖熏頭面名五虎茶得汗解又生薑搗爛綿裹擦天庭並治中風痰結又令兩人各持薑一團擦兩手足心兩臂彎前胸後背得汗解並治夏月霍亂寒中三陰吊腳痧等症傷寒誤服補藥閉邪於內虛不可表者用大藥店整包細辛中黃土煎盆湯坐熏得微汗自解傷寒衄血井水磨黃芩白芨塗山根又白芨磨本人鼻血塗山根又紙浸白芨水貼眉心或切白芨片貼眉心又茶調決明貼胸以清肺熱又延胡索塞耳左衄塞右右衄塞左又井泥搭囟門頸後及脊上均是血路又醋和黃土塗腎囊又黃酒浸足衄久用牛膠燙軟貼山根髮際傷寒吐血醋調大黃掩臍又白芷黑山梔煎尉胸口清胃熱治衄研末吹鼻內又韭汁童便磨鬱金綿蘸擦背又蒜泥裹足引熱下行並治衄血少陰誤汗熱逼血出九竅名下厥上竭用涼水噀之傷寒大病後熱毒攻目煮蜂房洗之日六七度又冷水漬青布掩目傷寒舌出巴豆一粒研細去油以紙卷納鼻中舌即收上又頂上梅花冰片五釐以牙色者為佳為末搽之即收傷寒腹痛蔥白炒覆臍上砂壺盛熱湯尉之又切蔥白如碗粗一束高寸許放臍上尉斗尉之蔥爛再易先放胡椒末或麝香丁香末於臍內再尉更妙並治陰症中寒四肢厥冷肚腹疼痛並治陰症腹痛吳茱萸一升酒拌濕布包二個分包飯甑蒸透熱更換多尉兩足心兼尉肚臍下候氣透手足暖為度或加麥麩食鹽蔥白等分同煎熱如前尉之亦效陰症腹痛剝熱雞皮貼又腹痛厥逆用芥菜子末溫水調貼臍上陰症傷寒男女交合後或外受風寒或內食生冷等物以致肚腹疼痛男子腎囊內縮婦女乳頭內縮或手足攣曲紫黑甚則牙緊氣絶謂之陰症傷寒又名夾色傷寒急用磚燒紅隔布數層在肚腹上尉之或照前蔥尉法治之輕則用前蛋尉法治之又紋銀一塊捶扁燒紅如病人未絶氣止燒滾熱放在臍上再用雞一隻連毛破開不去腸包於銀上用布縛住以手按緊即愈若人已死揭雞看視如雞青銀黑另換雞銀再包即愈如無銀只用雞亦可又胡椒四十九粒連須蔥頭四十九個共搗成泥加鍋底煤即百草霜取燒草者佳一撮再搗勻分二處布攤一貼臍上一貼龜頭用線捆住少頃即愈又胡椒四十九粒飛礬黃丹各一錢共研細末以好酒和為丸男置左手心女置右手心正對陰眼合之緊緊按定少頃腹內燥熱不可搖動即愈婦女尤效又胡椒一粒搗碎黃丹三分火硝二分男以左手心受藥用指研勻即將藥末封馬口按住女以右手受藥自按其陰又以布貼臍上取滾水一壺尉之又急使小兒溺小便於病人床前令人用足男左女右將尿浸濕泥推擦成團為餅敷臍上再用滾水一罐在泥餅上尉之甚效以上兩方非因陰症起者無論男女亦治又露蜂房三錢燒存性和蔥白五寸同研為丸著手中男左女右握於陰口靜臥汗出即愈又名健陽丹亦名回春丹胡椒枯礬火硝黃丹各一錢丁香五分醋為團握掌心被蓋取汗忌飲茶水一方無火硝用四味填臍此方並可用麻油熬黃丹收臨用摻川椒末貼又持病人陰莖直上扯至腹上盡頭處用艾炷灸七壯即效又用雞蛋三枚少水煮熟去殼在滾水內盡煮用銀簪插在蛋空頭病人仰睡將熱蛋放於臍孔上看此蛋一暈一暈自黑到頂除之換一蛋照前合上看其蛋黑止其病即愈重症三蛋必效又芥菜子七錢乾薑三錢共為末水調作一餅貼臍上手帕縛住置鹽其上用火尉斗不離尉之汗出為度傷寒後交接勞復卵腫縮腹中絞痛欲死取交接婦人衣服以覆男子陰陽易病傷寒初愈入房男移病於女名陽易女移病於男名陰易用桑木灰牡蠣胡椒良薑草烏白芍麝香共研末男以女唾調塗腎上女以男唾調塗乳上得汗解傷寒便祕見前紫蘇尉法後又削生薑如小指長二寸鹽塗之內下部中立通又豬膽和醋少許灌穀道中傷寒小便不通蝸牛一個用冰片少許點入螺內即化成水滴臍中立解又皂角半夏麝香填臍內外用田螺蔥白搗餅蓋之又雄黃研細末蜜和為丸如棗核大納溺孔中令入半寸兼療天行小便不利又搗生蔥敷臍下橫文中燥則易之傷寒熱病手足腫欲脫生牛肉裹之腫消痛止又酒煮苦參以漬之又螺螄入鹽少許搗敷又蒼耳草絞取汁漬之又以稻穰灰汁漬之又豬膏和羊糞塗之又菜子油敷又馬齒莧搗融敷傷寒遺毒手足腫痛欲斷黃柏五斤水三升煮漬之傷寒足痛即脫腳傷寒樟木一段打碎為末煎湯遠年尿桶砂一兩為末和陳小粉調敷在大熱痛處有奪命功感冒此偶為風寒所感其症較輕於前之傷寒症故另立感冒一門或照前各方施治亦可風寒作痛橘子葉老薑蔥頭不拘多少和酒炒熱用布包裹於患處頻頻尉之其病若失感寒無汗水調芥子末填臍內以熱物隔衣尉之取汗出妙發散寒邪胡椒丁香各七粒碾細以蔥白搗膏和塗兩手心合掌握定夾於大腿側溫覆取汗即愈傷風感寒頭目不清川芎藿香延胡索丹皮各二錢雄黃白芷皂角各四錢硃砂一錢研細末吹鼻重傷風鵝不食草一名移星草研末吹鼻涕淚出即清爽冬月可代痧藥風寒發汗蒼朮羌活明礬生薑汁丸握手心夾腿間側臥暖蓋取汗不汗熱湯催之暴寒中人伏於少陰經旬日始發為咽痛者俗名腎傷寒用半夏桂枝甘草薑汁調塗頸上及臍內再用附子片貼足心暴寒襲入肌膚觸之若無皮者川椒燒酒煎布蘸尉之暴寒身如水冷用蠟熔化攤舊絹上綢布均可隨患大小貼之並裹兩手足心冷則隨換甚效或用土尉法身受風寒心腹疼痛飲食少進大便閉塞小便短澀上下關格不通渾身繃緊甚至手足僵硬不省人事涼熱難分用陳乾土磚搗成粗末約二斤許以鍋炒大溫熱用青布包好以半揉尉胸腹腰背等處冷則另換一半周流揉尉約半時久自覺胸腹氣流通而愈或再用皂角少許吹鼻取嚏則氣隨通暢中風癱瘓諸風二門當參看中風不語以苦酒煮芥子薄頸一周以衣包之一周時乃解即瘥或用醋煮白芥子敷頸並治舌本縮又令人以溺澆其面即醒又用龜尿點少許於舌下即出聲亦治中風舌強又黃耆防風各數兩煎水一大盆放床前使熱氣熏之時時不斷熏至一日即語神效中風閉症先通關南星薄荷半夏皂角細辛共研末搐鼻有嚏可治無則肺絶不治小兒驚風亦用此試中風昏迷不省牙皂莢去皮弦二兩生明礬一兩二味同入水中煮化取出曬乾為末北細辛去葉土淨五錢共研細末用少許吹入鼻中即醒又生薑嚼碎不拘多少向患者面上天庭等處頻擦又以生薑汁滴男左女右眼內角即醒中風口噤烏梅肉生南星冰片擦牙或用薑蘸南星冰片擦牙其噤自開名開關散此即鑑本治小兒口噤神方也如口不開筋絶不治又白鹽梅揩齒即能開並不傷齒中風發熱大戟苦參各三兩白酢漿煎洗中風逆冷南星川烏二味同黃蠟融化攤手足心並治驚悸中風偏枯表邪固