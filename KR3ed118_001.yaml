性樟腦各等分共研極細末俟出汗時用老薑蘸擦患處兩三日洗去即除根神效又密陀僧為末黃瓜蒂擦之亦效白虎風水牛肉脯一兩炙伏龍肝燕窠土飛面各二兩砒黃一錢水丸摩痛處砒黃即生砒癧瘍風茵陳蒿兩握水一斗五升煮七升先以皂角湯洗後以此湯洗如冷更作隔日一洗不然恐痛雞爪風線雞屎花椒枯礬煎冷洗鬼箭風堆花燒酒搽患處用手拍見青色即愈又野苧麻川南星同搗敷又以桃葉亂髮為團擦之又山梔子桃枝飛面為餅貼患處尉斗尉之鶴膝風商陸草取葉入鹽少許搗敷患處自愈又甘菊花陳艾葉作護膝常帶之可免風濕病癮疹風痹癮疹蛇床子二升防風三兩生蒺藜二斤三味切以水一斗煮取五升漬綿拭之日四五度又白朮三兩戎鹽五錢黃連黃芩川芎細辛莽草茵芋各一兩礬石五錢上九味切以水一斗煮取三升洗之日三度又取枳實以醋漬令濕火炙令熱適寒溫用尉上即消癮疹百療不瘥景天亦名慎火草一斤搗絞取汁塗上熱炙手摩之再三即瘥癮疹簡便方石灰和醬水塗之瘥又芒硝水塗之痰疾急救中痰此症似乎中風惟見口眼斜閉喉內有聲用細辛末吹入鼻內得嚏即蘇切不可用薑灌之不救亦不可使聞薑氣又以小便對口射之痰厥死巴豆搗爛綿紙包壓取板油作燃燒煙燻鼻中片刻吐出痰血即愈又生半夏末如豆大吹兩鼻中中痰厥生附子蒜頭醋煮搗成餅貼湧泉穴即足心若口渴不可便飲茶中寒中風俱可貼積痰頂大蔥白頭二三十個略搗爛入鍋內炒熱俟微溫塗於胸坎不久積痰自出痰塞皂角一斤生甘草一兩黨參五錢百草霜三錢陳酒熬膏臨用加薑汁調塗頸名黑龍膏痰熱延胡索煅二錢牙皂十四枚青黛六分麝香一分清水為錠名青金錠兼治中風驚風乳蛾等症臨用水磨滴鼻凡痰熱皆可磨塗心口化痰巴豆一粒研成粉帛包每日嗅數次痰火牛黃硃砂各一分冰片五釐麝香三釐將蝦蟆取膽和前四味為末碾細將舌尖刺破點藥其痰即時下行妙諸癇鴨舌膽礬煅存性為末每發時用一錢以筆管吹入鼻內涎出即愈黃疸附黃腫黑疸黃疸身黃如金或兼腫脹嘔吐或眼目亦黃急用薄草紙以筆管卷如爆竹樣將一頭以紙封緊用黃蠟以銅器熔化將紙筒四圍澆勻不可使蠟入筒內令病人仰臥將蠟筒罩肚臍上以封過一頭向下再用灰面作圈護住筒根勿令倒下勿令泄氣筒頭上點火燒至筒根面圈處取出另換一筒再燒看臍中有黃水如雞蛋黃者取出輕者燒七八筒重者數十筒日燒二次總以取盡黃水為度有患此者身如金色遍身腫脹飲食入口即吐百藥不效照此治之三日全愈真仙方也按此症有陰黃陽黃之分此治陰黃最妙又苦丁香為細末搐鼻內一時鼻出黃水水盡即止三日後再搐一次全愈搐時分男左女右並治黑疸又青背鯽魚一尾全用加砂仁一兩洋糖一撮搗爛入蚌殼內覆臍上一夜見效又雄鯽魚一尾去頭骨止用背上肉兩塊胡椒每歲一粒至十粒止研細麝香三分上二味同搗爛麝香另加不必同舂恐黏染石臼上將蛤蜊殼填滿合病人臍上用絹縛緊一日夜即愈又鮮虎掌草即天南星葉搗爛放茶鍾內平口扣在臍上一寸許汗巾縛住越一晝夜解下腹上自起一大泡用銀針從下面刺破漸漸流出黃水水儘自愈如無鮮草以乾者為末水調照前法治之黃疸腫滿苦葫蘆瓤如大棗許以童便二合浸一時取酸棗大二塊納兩鼻中深吸氣待黃水出良黃疸陰黃及身面浮腫甜瓜蒂丁香赤小豆各七枚為末吹豆許入鼻少時黃水流出隔日一用瘥止熱病發黃甜瓜蒂為末以大豆許搐入鼻中輕則半日重則一日流出黃水隔一日再吹乃愈濕熱發黃或因失飢過飽或因素有濕熱汗出浴身而成者生薑時時周身擦之其黃自退或加茵陳蒿尤妙遍身黃腫握新鮮百條根一名野天門冬洗搗敷臍上再以糯米飯半升拌水酒半合揉軟蓋藥上用帛包住一二日後口內作酒氣則水從小便出腫自消黃疸眼黃不腫黃腫色帶白眼如故濕熱未甚多蟲與食積所致又燒酒調白芥子末二錢攤貼小腹上起泡為度忌吃糖鹽黑疸明礬滑石大麥芽各等分研敷勞傷治一切虛勞咳嗽吐血燒熱等症但脈息有神無不應效箭頭砂一兩明雄黃五錢共研細末綿紙包固選未曾行經十二三歲童女身體壯實無病者將藥貼放童女臍內用布捆緊過一周時取下稱藥比前多重一二錢者更妙即刻捆於病人臍上先備人乳十餘碗俟病者口乾發燥飲之渴止然後解去臍上之藥其病自去再用枇杷膏見驗方新編調養一月百無一失不可服別藥以免誤事太乙真人熏臍法通治勞傷失血及陰虛遺精白濁陽痿精神倦怠痰火婦人赤白帶子宮冷諸症麝香龍骨虎骨蛇骨附子木香丁香乳香沒藥雄黃硃砂五靈脂夜明砂胡椒小茴香青鹽兩頭尖各等分以麝填臍眼蕎麥圈臍外填藥蓋槐皮艾灸之汗出病已慎風寒戒油膩生冷酒色等如畏灸者可加艾和藥裝袋鋪腹上尉斗尉之逼藥氣入肚但令溫暖即止亦有效濟衆熏臍法川烏沒藥乳香雄鼠屎續斷各二錢麝香一分食飽後灸如前法勿令痛反泄真氣每年中秋行一次隔兩日一灸灸至臍內作聲大便下涎物為止只服米湯食白粥黃酒助力治勞病人未全虛者水灸法白鴿糞淨靈脂白芥末各五錢生甘草末二錢加大蒜五錢同搗入醋化麝香一分攤脊上皮紙蓋一炷香七日一灸或用白鳳仙豬脊筋同藥末攤貼背脊又白鴿糞三五合炒焦布包從尾閭起擦上至大椎又從大椎起擦下至尾閭如此數十遍日夜數十次蟲盡死先用濕紙搭背梁看一點先干處是蟲所在須竭力擦之驗癆蟲法用乳香燒煙燻病人手背男左女右以綢帕蓋手掌心良久有毛從掌中出白者能治紅者難治黑者不治無毛者即無癆蟲灸癆蟲法用濕紙條貼背脊上先乾者即癆蟲處以墨點記用老蒜切片貼上以艾一團放蒜片上燒之多燒為妙無蒜用薑亦可先備火盆鐵鉗如蟲出即用鉗夾入火盆內或遠送野外埋於土內恐飛入人口鼻內須謹防之治癆蟲法鳳仙根蘸潮腦擦背或加薑桂同搗擦又雄精硃砂硫黃去沙泥各一錢麝香一分各研極細末瓷罐收藏以頂好燒酒和勻用獨頭大蒜去蒂蘸藥從尾閭脊骨徐徐逐節擦上如有腫處或極痛之處即系癆蟲所在須於腫痛處多擦數次其蟲自滅不拘新久一切癆病皆能除根如病重者須澤天醫吉日總以午時擦之為妙端午日更佳忌戊日巳日除日此藥能開背後三重關竅即虛怯疰夏之人於端午擦之亦能神清氣爽經絡流通大有裨益此方傳自海外屢試神效又八月朔日早收百草頭上露水點膏肓穴在背上第四節骨左右兩旁各三寸最為神驗傳尸癆熬商陸根囊盛尉或佩麝香安息香再用甘松元參炭屑加白蜜和丸常燒可以闢蟲免傳染諸血凡鼻舌諸衄皆分載各本門須參看吐血不止好酒四斤燉滾浸兩足即止又用藕汁或雞子清磨墨塗胸口韭菜汁亦可磨肝血尤宜一切失血眩暈生地塞耳鼻九竅出血新汲水洗足即止又小薊百草霜香附蒲黃炒擦牙並摻出血處又石榴花揉塞之效用葉亦可口鼻出血不止用陳年尿壺火上烘熱向鼻熏之立止如神亦治耳鼻流血不止毛孔出血不止豬瘦肉一厚片貼之即止豬皮亦可又草紙燒灰候冷敷之亦止肌衄硃砂寒水石麝香研細末撲又煮酒罈紙揉碎如楊花攤之立止瘀血在胸不能飲食炙肉令香置口邊引出竇瘀而上胸自開名騙通法諸汗自汗常出者為自汗鬱金研末臨臥時蜜調塗兩乳上即止或用津塗又何首烏末津涎調塗臍中用布捆定即止又舊蒲扇燒灰和粉撲之或用酒調服蒲扇灰一錢甚效又五倍子枯礬各等分為末口水調勻填臍中用布縛定亦效自汗不止粳米粉絹包頻頻撲之又糯米龍骨牡蠣各等分為粉撲之即止又牡蠣一兩研末絹袋撲之又牡蠣熬二兩附子泡五錢麻黃根二兩搗篩以白粉一升和合粉汗汗止忌豬肉盜汗睡中出者為盜汗五倍子研末用人乳調蒸熟丸如龍眼大每用一丸貼臍上外以核桃殼蓋之用布捆定一周時取下再換貼至十日後即止又五倍子焙研細末以自漱口水調敷臍上一方用五倍子去蛀末炙乾研細男用女唾女用男唾調厚糊填臍中外用舊膏藥貼之勿令泄氣兩次即愈陰汗腎虛陽衰者蛇床子酒炒白礬陳醬各等分煎湯洗之血汗發灰撲又郁李仁研生梨汁調敷治一切虛汗盜汗自汗及漏風等汗泄不止諸藥不效者麻黃根白朮藁本牡蠣龍骨各五錢糯米粉二兩冰片五分共研細末撲之誤用麻黃汗出不止將病人頭髮浸水並用上撲法瘧疾治瘧方牛皮膠二兩熬化加生薑三兩搗極爛攪勻熬成膏聽用於病發之先一時用皂莢水洗淨背脊拭乾再以生薑一大塊揉擦極熱用寬長細布一大塊將膏攤上貼之從衣領處貼起並敷兩膝蓋過一二日即痊愈愈後五日方將膏藥揭去極效又用草從左手中指頂尖處量至中指根處為止將草摘斷即用此草從根量至掌再從掌量至腕為度以墨點記用獨頭大蒜研爛敷於墨點處用核桃殼蓋上以布扎緊一個時辰即去之神效又胡椒硫黃各二釐研末糝膏藥上貼背脊之正對肚臍眼處過期即愈又明雄黃製附子真潮腦各等分為細末於瘧未發前一時以棉花少許包裹藥末三分塞鼻孔中男左女右塞藥後勿食湯水睡過此時即愈重者依法塞二次小兒量為減用又巴豆二十粒南星一個白麵少許水調捻餅用膏藥貼額上及灑地金錢草又名遍地金錢亦名破銅錢又名滿天星清早塞兩鼻孔中各一丸雖三日一發之瘧可以立愈又桃頭七個向天者獨頭蒜七個胡椒四十九粒五家粽尖五月五日午時共搗為丸雄黃為衣扎肚臍內一周時即愈又常山草果丁香少許用上好酒半茶杯煎數滾盛鍾內熱熏鼻孔即愈又老生薑四兩搗爛於未發先一時敷膝上男左女右用油紙藍布包裹緊扎好勿令汁流出立效又斑蝥一個用膏藥貼於印堂須早一日貼一周時即效又馬齒莧搗扎手寸口男左女右又三次之後臨發前一時用魚醒草一握搗爛絹包周身摩擦得睡有汗即愈又桃仁半片放內關穴上將獨頭大蒜搗爛罨之縛住男左女右即止又蛇蛻塞兩耳即愈又生黃丹五錢生白明礬三錢胡椒一錢五分為末麝香五釐共研末臨發時對日坐定將好米醋調藥末男左女右縛手心外加絹帕緊扎待藥力熱方行出汗為度如無太陽腳下用火此藥一料能治三人年老身弱怕服藥者用之又當歸川芎防風甘草陳皮蒼朮杜仲檳榔草果半夏常山荊芥知母各一錢真烏梅五錢燒熟打碎將藥共放鍋內炒熱於未發時用稀布包裹捆扎臍上臍內先以藥末三分填滿其發必輕再炒再捆無有不效間日瘧更效輕則一服重則兩服年老人不肯服藥者用此尤妙又川貝母一片放膏藥上男左女右貼大膀灣軟處不與人知立愈又常山草果川烏草烏陳皮甘草各一錢將絹袋盛之聞於鼻間即止只聞香氣不可煎食又緑礬少許摻棉花上扎緊男左女右塞鼻內又桂心一分麝香三釐川椒七粒雄黃七釐共研極細末納臍中外以膏藥貼之虛寒瘧更效孕婦忌貼又大棗肉兩個去皮核斑蝥兩個焙研同研勻加熟豬油少許搗成餅子指頭大貼在兩眉中間印堂上一周時即止胎瘧忌貼隔日瘧方旱蓮草研碎如黃豆大以紫蘇葉裹之男左女右塞鼻孔內半日即出涕淚輕者立愈重者漸次而愈或照以上各方治之治瘧發汗法柴胡一握搗爛絹包擦周身得睡有微汗解又柴胡當歸知母穿山甲各等分煎湯新棉花或布蘸尉背瘧疾脅痛青皮炒尉痛處瘧疾化痰薑汁貝母半夏為丸擦胸背久瘧成痞胸脅高起者是又名瘧母毛腳芹菜大蒜銀硃同搗爛塗患處以油紙蓋上扎住半日皮上疼痛口中有蒜氣出其塊自消又大蒜一個曬乾研細末朴硝三錢研末獨頭蒜共捶融成膏貼自消又獨頭蒜一個黃丹一錢番木鱉焙為末五分共搗成餅放患處扎好口中有蒜氣出即去之內自消矣小兒久瘧不愈赭石三錢燒紅醋淬硃砂五分砒霜一豆大各藥用紙包七層水浸濕火中煨乾研末加麝香五釐香油調搽鼻尖眉心及手足心神效久瘧人虛嗅甜肉桂或塞鼻則寒自退熱自輕神爽氣清思食而愈截瘧方叩頭蟲一個安眉心蟲頭向上膏藥蓋住過時自愈又名貼臍截瘧丸胡椒雄精各等分研末將飯研爛為丸如桐子大外以硃砂為衣將一丸放在臍中外用膏藥貼上瘧即止神驗禳瘧法用紅紙包米一撮茶葉一撮銅錢三十文包時斷不可令人見亦不可令人知包成次日於清晨出門直走所向之方不可回頭暗拋路旁亦忌人見拋後䫀頭直走不可回顧由別路歸家其病如脫又未發前抱大雄雞一隻著懷中時時驚動令作大聲無不瘥瘟疫闢瘟方名太乙流金散雄黃三兩雌黃六兩礬石鬼箭羽各一兩五錢羚羊角燒二兩上五味治下篩三角絳囊盛一兩帶心前並挂門戶上若逢大疫之年以月旦青布裹一刀圭中庭燒之瘟病人亦用此燒熏之又名雄黃散雄黃五兩硃砂菖蒲鬼臼各二兩上四味搗篩末以塗五心額上鼻人中及耳門又馬骨一塊裝紅布小袋內佩帶身旁男左女右又向東桃枝煎湯日浴二次自然不染又黑豆一撮暗投水缸忌人見又貫衆一個白礬一塊放水缸內亦效又艾炷密熏臥床四角不令人知又蒼朮為君倍用羌活獨活白芷香附大黃甘松山奈赤箭雄黃各等分為末麵糊丸如彈子大黃丹為衣曬乾焚之又蒼朮雄黃丹參桔梗白朮川芎白芷藜蘆菖蒲皂角川烏甘草薄荷各五錢細辛蕪荑各三錢以上俱用生料曬乾研末燒熏可闢瘟氣屢試神驗又紅棗二斤茵陳八兩切片共燒煙燻可免瘟氣又蒼朮末紅棗共搗為丸如彈子大時時燒之可免時疫傳染又凡入病家用香油調雄黃蒼朮末塗鼻既出用紙條刺鼻孔取噴嚏再飲雄黃酒一杯決無傳染又雄黃研細末水調多敷鼻孔中即與病人同床亦不傳染真神方也治瘟方凡聞病人汗氣入鼻透腦即散布經絡初覺頭疼即用芥菜子研末溫水調填肚臍中隔布一二層上以壺盛熱水尉之至汗出而愈又蒼朮良薑枯礬各等分為末每用一錢以蔥白一大個搗勻塗手心男左女右掩肚臍手須高起勿使藥著臍又以一手兜住外腎女子掩住前陰煎緑豆湯一碗飲之點線香半炷久可得汗如無汗再飲緑豆湯催之汗出自愈並治大頭瘟瘟疫心腹疼痛白烏骨雞殺之破開去腸雜撲心上即愈或用血塗心上亦可並用雞肉煮湯食極效或用癩蝦蟆破開撲心上亦效愈後須戒殺放生免再傳染酒尉法治瘟疫傷寒時症或飯後氣惱心口脹悶填塞不舒用上好燒酒燉熱將布二塊蘸酒自胸向下搽抹布冷再換熱布輪替搽抹如此數次其氣自通而愈羊毛瘟凡男婦大小陡然腹痛不過一二時即死醫藥不及用針灸不及施惟有速往十字街心或十字路心於衆人日逐往來之處挖泥土數升以冷水和丸如雞子大即在病人臍旁及心窩內外磨擦良久俟泥丸稍熱破開看之如丸中有羊毛是其症無疑另換泥丸再擦以不見羊毛為度雖已氣絶身未冷者皆可治若擦之並無羊毛即非此症當另治又用蕎麵照上法治之更妙蝦蟆瘟側柏葉搗自然汁調蚯蚓泥敷之大頭瘟此症頭面腫大咽喉閉塞急用延胡索一錢五分皂角川芎各一錢藜蘆五分躑躅花二分五釐共為末用紙捻蘸藥堆入鼻孔中取嚏日三五次甚效嚏出膿血者更妙無嚏者難治左右看病之人用此取嚏亦不傳染又扁柏葉搗爛雞子清調敷又蚯蚓十餘條又名曲蟺以白糖拌入碗碟蓋好半日即化為水至遲一日必化用鴨毛蘸水敷之即消百發百中之仙方也無白糖之處用蚯蚓糞井水調敷須戒殺生又燕子窩連泥帶糞捶融醋調敷立愈又吳茱萸研末醋調敷足心一周時取下即消如未愈再敷一周時必效又馬蘭頭一把搗汁將鵝毛搽上一日五六次熱氣頓出神效中暑宜與霍亂痧症兩門參看夏天道路受熱忽然昏倒名中熱切不可誤用冷水噴灌一受寒冷則不可救急用稻草即結為長帶曲盤肚臍外用熱土搓碎圍之使人撒尿其中令溫氣入腹久之自愈又草紙捲成筒點火向口鼻間熏之即活甚效又用布蘸滾水更換尉臍與臍下三寸醒後仍忌飲冷水飲之復死中暑暴昏大蒜搗爛調冷水小半杯取茶匙挑灌於鼻孔中立蘇又凡熱行道中自覺頭目昏悶不能支持速伏道上口鼻向土立效中熱口渴面赤煩躁欲死掘地深尺余取淨黃土以新汲水調化敷胸口及臍上中暑挾虛昏絶沉香檀香燒熏令香氣滿室以達其竅即醒暑風手足搐搦以蘇合丸擦之並用香薷黃連煎水拓胸暑症身熱頭疼狀如傷寒煩渴嘔吐昏悶不食硫黃硝石各一兩明礬雄黃滑石各五錢白麵四兩井水調敷腹暑天怕風鵝不食草陰乾好燒酒浸一宿日乾夜間又浸如此七次若右邊痛將草塞右鼻左痛塞左鼻一時許鼻流冷水盡即愈受暑大小便不通用田螺三枚搗爛入青鹽三分一作青黛攤膏貼臍下一寸一作一寸三分即愈霍亂與中暑痧症參看治霍亂方細看病人背上如有黑點用針一一挑破出血即愈若遲一日則不能救矣又炒鹽填臍內用艾放臍上燒之以燒至止痛病醒為度已死而心頭微溫者亦可活霍亂腹痛大蒜搗如泥塗心上立效又鹽二斤炒熱用青布包兩包更換尉腹上久之氣透即愈又吐瀉腹痛用蒼朮藿香陳皮半夏青皮桔梗枳殼蘇葉厚朴甘草節各五錢原蠶砂二兩生薑蔥白各三錢炒熱布包尉甚妙霍亂腹痛兩腿轉筋芥菜子研細末填臍內立效又蒜鹽敷臍又用熱醋煮青布抹胸腹或㩉腳膝冷復易之又蒜泥加黃蠟塗足心又皂角末吹一豆大入鼻取嚏即安又南星醋調塗兩足心又如轉筋已死心下尚溫者用硃砂二錢黃蠟三兩和勻燒煙燻口鼻並臍更貼手足取汗又轉筋而肢冷者用燒酒摩拓患處效又男子以手挽其陽物向上女子以手牽其乳向兩旁即愈亦治尋常轉筋腳麻腹瀉疼痛尉臍方倭硫黃上肉桂吳茱萸丁香各一錢麝香三分共研細末每用二分青蔥汁調勻置臍中外貼一小膏藥炒熱麩皮尉之不可誤入口中一方無吳萸有香附共五味各等分摻暖臍膏貼臍上並治吊腳痧脾元虛損霍亂不吐瀉腹脹如鼓心胸痰塞丁香七粒菖蒲根五錢甘草炙一兩生薑三大片鹽一合炒尉痧症與霍亂參看刮痧法擇一光滑細口瓷碗另用熱水一鍾入香油一二匙將碗口蘸油水令其緩而且滑兩手覆執其碗於病人背心上輕輕向下順刮切忌倒刮以漸加重碗干則蘸油水再刮良久覺胸中脹滯下行始能出聲頃之腹中大響大瀉如注其痛遂減睡後通身搔癢或發出疙瘩遍身而愈今有於頸臂刮痧者亦能治病然五臟之系咸附於背向下刮之邪氣隨降故毒深病重者非刮背不可也此為痧症起死回生簡便良方最靈最穩吾鄉有用銅錢蘸香油或水刮痧者似較簡便又擦法以食鹽一握揉擦兩手腕兩脅兩足心並心窩背心八處擦出紫紅點許多自然漸漸鬆快而愈一切痧脹及中暑霍亂等症雖垂死亦活真良方也又方嫩車前草七根揉軟塞鼻孔內男左女右烏痧脹即乾霍亂凡暑熱痧脹將燒酒半鍾用頭髮一團蘸燒酒向胸前揩擦以酒盡為度痧脹即解又用老薑汁點眼角內男左女右汗出即愈絞腸痧陰症吳茱萸食鹽各四兩炒熱用布分作兩包輪尉其臍腹效陰症時痧水足抽吊者即今之吊腳痧硫黃肉桂各二錢五分炮薑硃砂各二錢黑附子五錢艾絨二兩和勻布包放臍上尉斗尉之又辣蓼草八兩搗爛宣木瓜四兩上二味同福珍酒二斤加水煎湯乘熱揩洗手足及遍身即愈又樟腦兩許一塊布包好浸入燒酒令透由背脊順擦至尾閭數十次即松又如症輕者用燒酒薑汁擦手足羊毛痧此因天氣鬱勃潮濕酷熱夜不能睡將曙露體乘涼風中有絲乘虛易入無論頭面手足胸背猝入則滿身刺痛一刻緊一刻痛至半夜白皮入心咆哮跳躍面色漸黃而死治法不用針刮將現藏燒酒甕上泥頭敲碎水調捻成泥團向周身滾轉幾遍剝開泥團見有絲如羊毛色亮則邪氣滾出自然平愈此仙法也案此與瘟疫門中羊毛瘟相似當參看鼓脹試鼓法用鹽四兩炒熱絹包放臍上水鼓鹽化水若食鼓鹽紅色血鼓紫色氣鼓黑色倘氣虛中滿鹽水不改必用白鹽試驗治水鼓方手按之下陷不起者是輕粉二錢巴豆四錢去油生硫黃一錢共研成餅先以新綿一片放臍上次以藥餅當臍按之外用布捆緊如人行五六里自瀉下候三五度除去藥餅以溫粥食之久患者隔日方去藥餅愈後忌飲涼水此方治水鼓如神其餘鼓脹功力稍緩又取蓋屋稻草煎湯傾入盆內先坐盆上熏之待湯溫方洗其腹小便隨下黃水熏洗數次永不再發余鼓脹亦可用此法治惟功稍緩耳又杜蒺藜或地骨皮照前法煎洗水氣自下水鼓小便不通小便通者亦可治大田螺四個去殼大蒜五個去衣車前子三錢研末共搗成餅貼臍中以帛束定水從小便出換二三次全愈終身勿食田螺又商陸根蔥白搗填臍中小便利腫自消或加麝香三分治氣鼓方按之隨手即起者是多年瓦油盞頭連垢膩火內燒熱合臍上良久自落垢膩已淨如洗腹亦平矣又面黑脅痛者用大麥芽炒尉血鼓小腹脹有血絲通身老黑色皮內有紫黑斑點者是酒煎荷葉洗婦人血鼓劉寄奴或馬鞭草煎湯熏洗食鼓噯氣作酸飽脹蘿蔔子炒熱尉治實鼓方甘遂巴霜木香各等分研細末填臍中治五鼓琥珀散大黃二兩巴豆五錢牙皂一兩五錢枳殼蘿蔔子炒各四兩琥珀一兩沉香五錢薑皮搗汁丸臨用研末摻膏貼凡治脹皆取三里穴在膝下三寸外旁膏藥照貼一切鼓脹肚飽發虛小便不通者臍內先填麝香一分再用甘遂末雄黃各一錢田螺一個搗敷臍上以帛束之待小便大通即解去腫滿卒患腫滿以蒴藋莖葉埋熱灰中令極熱以敷腫上冷再易一日夜盡消通身水腫黍莖掃帚煮湯浴之水腫面浮甚土狗一個輕粉二分五釐為末每搐少許入鼻內黃水出盡為妙水腫從腳起入腹能殺人赤豆一升煮爛取汁溫漬足膝水腫但兩足腫銼蔥葉煮令爛以漬之日三四度良身體暴腫如吹巴豆三十枚合皮㕮咀以水五升煮取三升綿納汁中以拭腫上隨手減消日五六拭勿近目及陰腹中脹滿綿裹煨薑納下部冷即易之上氣咳嗽腹滿體腫楸葉三升煮三十沸去滓煎堪作丸如小棗子大以竹筒納下部立愈痞積治痞方吳茱萸酒炒布包走逐尉之又莧菜不拘紅白均可十斤洗去泥不必去根以河水煎湯兩大鉢用活甲魚一個重十二三兩者不必切碎入莧菜湯連骨煮爛如膏去渣將甲魚膏薄攤曬乾研末用麻油八兩熬至滴水成珠下甲魚膏四兩如甲魚膏不足以鉛粉添配攪勻成膏收之用青布褙紙一層量塊大小攤貼七日即消重者貼至兩次永不再發屢驗又用水紅花新鮮者同老蒜打爛量入皮硝一二兩捏成餅比痞塊大一團放痞上用袱包扎緊待乾再換則痞自消又水紅花子熬膏入麝香少許貼之又紅芥菜子即豬血芥不拘多少生薑汁浸一宿大約芥子一酒杯加麝香一錢阿魏三錢同搗極爛如膏藥攤青布上貼患處外用汗巾扎緊一宵貼過斷無不消又名藥豬胞麝香一錢阿魏三錢水紅花子大黃歸尾甘遂急性子甘草各一錢上為細末用豬尿胞一個量痞塊大小用尿胞大小裝入乾燒酒半胞將前藥末放入胞內緊扎住口用白布將胞兜扎於患處俟塊化盡即去之不可遲也又桌椿樹皮在上中者佳要一大束去粗大止用白皮二斤切碎入鍋內水熬瀝去渣用文武火熬膏薄攤布上先以生薑搓出垢膩後以膏藥在錫茶壺烘熱貼痞塊上其初微痛半日後即不痛候其自落一張即好永不再發貼膏時微撒麝香少許於膏上然後貼之貼上膏藥周圍破壞出水即愈雖脹滿腹硬過臍者貼一二張亦見效孕婦忌用又雄黃白礬各一兩為末麵糊調膏攤布上貼之俟大便脹滿而極多者即愈此祕方也又蔥白汁薑汁各四兩水膠八兩好黃酒二鍾同水熬成珠攤狗皮上貼患處治諸積及氣血食三鼓白馬糞同大蒜搗敷治卒暴症方蒜十片去皮取五月五日戶上者伏龍肝鴨蛋大一枚桂心一尺二寸上三味合搗以陳酒和之如泥塗著布上掩患處三日即消又腹中暴症有物如石痛刺啼呼不治百日死用商陸根搗汁或蒸之以布藉腹上以藥鋪布上以衣覆之冷即易晝夜勿息治鱉症陳醬茄燒存性入麝香輕粉各少許脂油調貼奇效治積塊龜鱉症白馬尿同白殭蠶搗敷治發症乃由人因食而入久即胸胃間如有蟲去來惟欲飲油油一升以香澤煎之安病人頭邊以口鼻臨油上勿使飲及敷之鼻面並令有香氣當叫喚取飲不得與之必疲極眠睡其發症當從口出飲油人專守視之並備石灰於旁見症以灰粉手捉症抽出須臾抽盡即是發也初從腹出形如不流水中濃菜隨髮長短形亦如之無忌又胸喉間覺有症蟲上下偏聞蔥豉食香此是發蟲故也油煎蔥豉令香二日不食張口而臥將油蔥豉置口邊蟲當漸出徐徐以物引去之無所忌食積治食積凡飲食停滯胸隔脹滿或大便不通或大便泄瀉或年老或體虛難以攻擊內消者用亂髮一團剪斷酒麴一個小者二三個亦可蔥白七個老薑二錢胡椒七粒以雞蛋一個破殼傾入碗中將各藥搗融和入調勻用隔夜燈油煎成一餅貼病人心口下胃脘處先用燈油於胃脘處順擦十次再貼如嫌太熱用紙隔貼亦可用布帶束住冷則煎熱再貼約一二時似覺鬆動即便取去其病立愈屢試神效若治小兒藥料可以稍減又紫蘇尉法亦極神效見傷寒門食積血痞蔥白搗和蜜攤布上貼患處用尉斗微火尉之治積聚及老人虛寒便祕巴霜乾薑良薑白芥子硫黃甘遂檳榔各等分飯丸清早花椒湯洗手麻油塗掌心握藥一丸少時即瀉欲止瀉冷水洗手治老人傷冷及難化之物生薑或紫蘇煎湯揉擦心胃肚腹氣通即食自化或煎湯傾浴盆中坐揉噎隔開隔方用牛口涎以鹽塗牛口即有涎狗涎吊狗一腳即有涎出童便煮大附子一個先塗麝於掌心俟附子臍發時取弄嗅之並嗅其湯亦能開關又雄雞破洗置大碗內糊紙飯上蒸熟戳孔以筆管插入含吸之俟熱氣衝入喉自開開關丹膽星一個瓦楞子一錢五分生礬枯礬雄黃牛黃琥珀乳香沒藥珍珠白降丹各五分白砒用人糞黃泥固煅取五分麝香一分以青魚膽丸如芥子大摻膏貼咳嗽咳嗽熏法天南星款冬花石鐘乳鬱金雄黃各等分為末以生薑一片含舌上用艾燒藥含煙入喉中取效久嗽不止罌粟殼末或五倍子末摻膏貼臍上又咳從臍下起者用破故紙末摻膏貼納氣歸腎自止乾咳嗽火鬱也薑汁和蜜擦背佳胸膈脹滿咳嗽不安宮粉香油入鐵器內熬數滾離火用頭髮一團蘸粉擦胸膈數次即愈並治各項咳嗽亦效又蕎麵雞子清和成團擦之勞嗽火嗽久嗽干嗽食積嗽酒嗽用青黛栝蔞貝母研末和白蜜為丸擦之甚佳咳嗽嗆逆雄黃一錢研細黃紙三張用雞蛋白將雄黃調勻搽黃紙上曬乾捲成紙管插入筆管或煙筒內燒燃吸之如吃煙樣少頃嘔吐嗽止一日一次忌食諸物七日惟食白粥如嫌氣味難受食白煮豬肉即解哮喘治哮吼妙法喉內有聲而氣喘者是病發先一時用鳳仙花又名指甲花連根帶葉熬出濃汁乘熱蘸汁在背心上用力擦洗冷則隨換以擦至極熱為止無則用生薑擦之再用白芥子三兩輕粉白芷各三錢共研為末蜂蜜調勻作餅火上烘熱貼背心第三節骨上貼過熱痛難受正是拔動病根務必極力忍耐切勿輕易揭去冷則將藥餅啓下烘熱再貼一餅可貼二三日無論病愈未愈多備藥餅換貼不可間斷輕則貼一二日重則貼三四日或五六日永不再發雖患此數十年者貼至數日斷根無論寒熱虛實鹽醬醋酒哮吼皆治藥味不可加減並治痰氣結胸及咳嗽痰喘治寒哮白果麻黃各等分搗塞鼻治遠年近日哮喘痰嗽蟬蛻去足輕粉馬兜鈴各一兩生靈脂生雄黃杏仁生砒各五錢淡豆豉四十九粒以生薑葶藶自然汁丸如黃豆大亦可以薑汁化一丸臨臥擦胸痰實氣喘紫蘇子白芥子蘿蔔子各等分炒尉痰喘上氣南星或白芥子用薑汁調敷足心治肺熱悶不止胸中喘急驚悸客熱來去欲死不堪服藥泄胸中喘氣方桃皮芫花各一斗以水四斗煮取一斗去渣以故布手巾納汁中敷胸溫四肢不盈數日即歇定喘方巴霜薑汁為丸橘皮裹塞鼻嘔吐治嘔吐噎膈反胃通用方胡椒八分酒藥一個蔥頭五根捶融有熱用茶炒無熱酒炒貼心窩嘔吐面赤手足心熱者竹茹生薑絞汁綿浸擦胸口治嘔吐並治噯氣痞氣及哮喘有聲金沸草代赭石土朱各等分研末醋調塗胸口大吐不止附子煎湯抹足聞藥即吐百治不效取家中灶心土藥店買者不真則不效水為丸塞兩鼻孔即不吐極效厄逆厄一作咳陰寒厄逆明雄黃二錢燒酒一杯煎七分急令病人嗅其熱氣即止又好硫黃乳香陳艾各二錢為細末用好酒一鍾煎數沸乘熱氣使患者用鼻嗅之外用生薑擦胸前最效又黃蠟燒煙熏二三次即止虛寒厄逆麻黃酒煎嗅其熱氣或燒麻黃煙嗅又羌活附子茴香木香乾薑鹽各等分布包烘熱尉之又如陰火上衝者用龜板熟地各四兩黃柏知母各二兩麻油熬黃丹收攤貼臍下久病厄逆薑汁白蜜和勻擦背偶然厄逆紙捻通鼻取嚏即止瀉痢治寒泄胡椒末和飯作餅敷貼臍上又熱柴灰布包敷又炒鹽敷又糯米酒糟和鹽炒敷又酒炒艾絨作餅敷又胡椒大蒜作餅敷又艾葉灶心土門斗灰吳茱萸共為末醋炒敷均效以上各方均敷貼臍上又車前子肉桂各等分研末納臍治熱泄車前子搗汁調甘草末滑石末各等分敷臍氣虛暴泄硫黃枯礬硃砂各等分研細末丸納臍瀉不止用艾一斤坐身下以火烘腳久泄不止大蒜搗貼足心或貼臍中又大蒜須加銀硃搗融敷臍眼內立止如神又土木鱉半個母丁香四粒麝香一分共為細末口水調為丸如黃豆大納臍中外用不拘小膏藥貼之立止並治痢疾小兒水瀉不能服藥巴豆三粒黃蠟三錢共搗爛成膏貼臍上用絹帕縛住半日即愈如噤口不食者加麝香三釐同貼並治痢疾又香白芷乾薑各一錢共研細末以蜜為膏先用酒洗臍溫微熱後貼膏用鞋底烘熱尉膏上氣通即愈寧和堂暖臍膏治水瀉白痢神效孕婦忌貼香油一斤一方用麻油生薑切片一斤黃丹飛過八兩熬膏攤布再加紅藥丸貼臍上紅藥丸方硫黃三錢母丁香一錢麝香三分加獨蒜數枚一方不用搗如泥入前三味研勻為丸如桐子大飛過硃砂為衣四時暴患瀉痢四肢臍腹俱冷者煎百沸湯令患者坐深湯中浸至膝上為度生陽之藥無速於此按百沸初出恐不能即坐或者先熏俟其稍涼方坐浸耳治痢方胡椒一歲一粒打碎大鯽魚一個去頭尾骨腸入椒末搗濃敷臍上甚效又茜草一握煎水浸兩足底又梧桐葉三四斤煎水洗足又巴豆一粒緑豆胡椒各三粒布包捶碎用紅棗二枚搗為丸敷臍上痢即止止後即去藥又川椒五錢研末麝香一分大棗一枚去皮核將二藥末摻棗上放入肚臍不拘何等膏藥蓋之痢疾點眼法初胎小兒糞瓦上焙乾一錢雄黃四分梅花冰片五釐為極細末水調點兩眼內角無論紅白痢及噤口痢危篤者皆神效紅白痢蔥二十四根連須不見水用布拭去泥真麻油十二兩鉛粉四兩將蔥入油熬去渣入鉛粉收膏油紙攤貼肚臍一周時一換三張全愈孕婦忌貼又吳茱萸黃連木香各等分研細末敷臍瀉痢至於脫肛石榴皮陳壁土加明礬少許濃煎熏洗再用五倍子炒研細末敷托而上痢後脫肛五倍子三錢研末白礬一塊水煎洗並可研末塗少許於肛門四旁又五倍子炒黃為末放熱鞋底上尉之又經霜浮萍草新瓦焙乾為末熱鞋底上尉之噤口痢田螺一個搗碎入麝香少許罨臍中引熱下行即效又細辛五錢牙皂一錢蔥三根酒藥子半個大田螺一個共搗成泥敷臍中候乾即去藥自然飲食又新大附子一個切片貼於新石灰上灑之以水俟熱即取附子片貼臍上冷再換貼三四次愈又雄黃巴豆硃砂萆麻子麝香各等分搗為細末和蜜為丸如芡實大收好不可泄氣放眉心以膏藥蓋之一炷香久腹內自響即思飲食去藥而愈此方百發百中可以預合濟人又黃瓜藤經霜者更效燒存性香油調敷肚臍上又吳茱萸研末醋調敷兩足心極效此亦引熱下行之法又木鱉子仁六個分作二分用面燒餅一個分作兩半隻用半餅作一劑納在內乘熱覆在病人臍上一時再換半個熱餅其痢即止思飲食又蒼朮甘草陳皮厚朴各等分為粗末用布包之放在肚上將尉斗尉布上逼藥氣入腹病者覺腹中爽快即將藥放枕頭下以受藥氣一日連尉三四五次痛痢漸止即能飲食矣又真烏梅一斤打碎熬水十數碗入一桶內令病人坐桶上周圍堵塞不令出氣使熱氣衝上糞門如溫即洗其人即睡去隨扶令安臥待醒即思飲食先以粥湯半盞食之少頃再食不宜飽餐當漸漸加增小兒烏梅減半用之神效又鐵稱錘或磚石燒紅放瓦盆內好醋淬入令病人聞之一日數次甚效冷疳痢莨菪子熬令黃搗為末和臘月豬脂更搗令熟為丸綿裹如棗許大納下部中因痢出即更納新者不過三度即瘥療疳法男婦小兒久痢百方不效此方最驗用丁香麝香黃連各等分搗為末似杏核大取竹筒吹入下部小兒取核子量力減之不過三四度瘥
